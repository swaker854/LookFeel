    .pt-label  { font-size:11px; font-weight:500; fill:#49454F; }
    .lgd-val   { opacity:0; transition:opacity 0.2s; }
    svg.print .lgd-val { opacity:1; }

    /* Standard palette */
    .bar-1 { fill:#00D4E8; stroke:#00D4E8; } .bar-2 { fill:#00B87A; stroke:#00B87A; }
    .bar-3 { fill:#F59E0B; stroke:#F59E0B; } .bar-4 { fill:#F43F5E; stroke:#F43F5E; }
    .bar-5 { fill:#8B5CF6; stroke:#8B5CF6; } .bar-6 { fill:#3B82F6; stroke:#3B82F6; }
    .bar-7 { fill:#0D9488; stroke:#0D9488; } .bar-8 { fill:#64748B; stroke:#64748B; }

    svg.dark .bar-1 { fill:#22D3EE; stroke:#22D3EE; } svg.dark .bar-2 { fill:#10B981; stroke:#10B981; }
    svg.dark .bar-3 { fill:#FBB724; stroke:#FBB724; } svg.dark .bar-4 { fill:#FB6181; stroke:#FB6181; }
    svg.dark .bar-5 { fill:#A78BFA; stroke:#A78BFA; } svg.dark .bar-6 { fill:#60A5FA; stroke:#60A5FA; }
    svg.dark .bar-7 { fill:#2DD4BF; stroke:#2DD4BF; } svg.dark .bar-8 { fill:#94A3B8; stroke:#94A3B8; }

    /* Standard animation — rAF driven, no SMIL */
    .bub-g { opacity:0; }

    /* Hover */
    .bw        { cursor:pointer; }
    .bubble    { opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
    .bw.active .bubble { opacity:1; }
    .ca.ready.hovering .bw        { opacity:0.20; transition:opacity 0.2s ease; }
    .ca.ready.hovering .bw.active { opacity:1; }
    svg.print .bubble { opacity:0 !important; }

    .bub-bg    { fill:#FFFBFE; }
    .bub-bdr   { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .bub-tip   { fill:#FFFBFE; stroke:none; }
    .bub-val   { fill:#1C1B1F; font-size:13px; font-weight:600; }
    .bub-lbl   { fill:#49454F; font-size:10px; }

    svg.dark .bg-main      { fill:#1C1B1F; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.25)); }
    svg.dark .ct           { fill:#E6E0E9; }
    svg.dark .an, svg.dark .cs { fill:#938F99; }
    svg.dark .lt, svg.dark .lv { fill:#E6E0E9; }
    svg.dark .gl           { stroke:#49454F; }
    svg.dark .bl           { stroke:#938F99; }
    svg.dark .lgd-bg       { fill:#49454F; stroke:#938F99; }
    svg.dark .lgd-div      { stroke:#938F99; }
    svg.dark .lgd-ttl      { fill:#938F99; }
    svg.dark .footer       { fill:#938F99; }
    svg.dark .bub-bg       { fill:#1C1B1F; }
    svg.dark .bub-bdr      { fill:#1C1B1F; stroke:#938F99; }
    svg.dark .bub-tip      { fill:#1C1B1F; stroke:none; }
    svg.dark .bub-val      { fill:#E6E0E9; }
    svg.dark .bub-lbl      { fill:#CAC4D0; }
    svg.dark .t-track, svg.dark .pt-track { fill:#49454F; }
    svg.dark .t-label, svg.dark .pt-label { fill:#CAC4D0; }
    .border-dark  { display:none; }
    .border-light { display:block; }
    svg.dark .border-dark  { display:block; }
    svg.dark .border-light { display:none; }
