<script type="text/javascript"><![CDATA[
(function() {
  var svg       = document.getElementById('root');
  var chartArea = document.getElementById('chart-area');

  /* §2 — isDark hoisted before all build and animation code */
  var isDark = false;

  /* ── rAF bubble fade-in — standard 0.8s, 0.25s stagger ── */
  var FADE_DUR = 800;
  var STAGGER  = 250;
  var bubGrps  = [1,2,3,4,5,6,7,8].map(function(i) {
    return document.getElementById('bg' + i);
  });

  function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

  var startTime = null;
  function animBubbles(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    var done = true;
    bubGrps.forEach(function(g, i) {
      var t = Math.max(0, Math.min(1, (elapsed - i * STAGGER) / FADE_DUR));
      g.style.opacity = easeInOutCubic(t).toFixed(3);
      if (t < 1) done = false;
    });
    if (!done) requestAnimationFrame(animBubbles);
    else {
      bubGrps.forEach(function(g) { g.style.opacity = '1'; });
      chartArea.classList.add('ready');
    }
  }
  requestAnimationFrame(animBubbles);

  /* ── hover dimming ── */
  var dataItemEls = Array.prototype.slice.call(svg.querySelectorAll('.data-item'));
  dataItemEls.forEach(function(itemEl) {
    itemEl.addEventListener('mouseenter', function() {
      chartArea.classList.add('hovering');
      dataItemEls.forEach(function(x) { x.classList.remove('active'); }); /* §4 clear stale */
      itemEl.classList.add('active');
    });
    itemEl.addEventListener('mouseleave', function() {
      itemEl.classList.remove('active');
      chartArea.classList.remove('hovering');
    });
  });

  /* ── dark mode — pure CSS, no JS color swap needed ── */
  function setMode(wantDark) {
    if (wantDark === isDark) return;
    isDark = wantDark;
    var thumb = document.getElementById('tthumb'), lbl = document.getElementById('tlabel');
    if (wantDark) {
      svg.classList.add('dark');
      if (thumb) thumb.setAttribute('cx','52');
      if (lbl)   lbl.textContent = 'Light';
    } else {
      svg.classList.remove('dark');
      if (thumb) thumb.setAttribute('cx','16');
      if (lbl)   lbl.textContent = 'Dark';
    }
  }

  document.getElementById('dark-toggle').addEventListener('click', function() { setMode(!isDark); });
  document.getElementById('print-toggle').addEventListener('click', function() {
    var thumb = document.getElementById('pthumb'), lbl = document.getElementById('plabel');
    if (svg.classList.toggle('print')) { thumb.setAttribute('cx','52'); lbl.textContent='Screen'; }
    else                               { thumb.setAttribute('cx','16'); lbl.textContent='Print'; }
  });

  window.setMode = setMode;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setMode') setMode(e.data.dark);
  });
  setMode(window.location.href.indexOf('theme=dark') !== -1);
})();
]]></script>
</svg>
