    <g class="bubble" transform="translate(549,247)"><rect x="-34" y="-44" width="68" height="38" rx="9" class="bub-bg"/><path d="M-8,-6 L-25,-6 Q-34,-6 -34,-15 L-34,-35 Q-34,-44 -25,-44 L25,-44 Q34,-44 34,-35 L34,-15 Q34,-6 25,-6 L8,-6 L0,8 Z" class="bub-bdr"/><text x="0" y="-32" text-anchor="middle" class="bub-val">$64M</text><text x="0" y="-16" text-anchor="middle" class="bub-lbl">Blue · 27%</text></g>
