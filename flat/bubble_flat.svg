  <linearGradient id="g1"><stop offset="0%" stop-color="#00D4E8"/></linearGradient>
  <linearGradient id="g2"><stop offset="0%" stop-color="#00B87A"/></linearGradient>
  <linearGradient id="g3"><stop offset="0%" stop-color="#F59E0B"/></linearGradient>
  <linearGradient id="g4"><stop offset="0%" stop-color="#F43F5E"/></linearGradient>
  <linearGradient id="g5"><stop offset="0%" stop-color="#8B5CF6"/></linearGradient>
  <linearGradient id="g6"><stop offset="0%" stop-color="#3B82F6"/></linearGradient>
  <linearGradient id="g7"><stop offset="0%" stop-color="#0D9488"/></linearGradient>
  <linearGradient id="goth"><stop offset="0%" stop-color="#64748B"/></linearGradient>

  <!-- Dark Mode Gradients -->
  <linearGradient id="g1d"><stop offset="0%" stop-color="#22D3EE"/></linearGradient>
  <linearGradient id="g2d"><stop offset="0%" stop-color="#10B981"/></linearGradient>
  <linearGradient id="g3d"><stop offset="0%" stop-color="#FBB724"/></linearGradient>
  <linearGradient id="g4d"><stop offset="0%" stop-color="#FB6181"/></linearGradient>
  <linearGradient id="g5d"><stop offset="0%" stop-color="#A78BFA"/></linearGradient>
  <linearGradient id="g6d"><stop offset="0%" stop-color="#60A5FA"/></linearGradient>
  <linearGradient id="g7d"><stop offset="0%" stop-color="#2DD4BF"/></linearGradient>
  <linearGradient id="gothd"><stop offset="0%" stop-color="#94A3B8"/></linearGradient>

  <!-- Legend Swatch Gradients -->
  <linearGradient id="c1"><stop offset="0%" stop-color="#00D4E8"/></linearGradient>
  <linearGradient id="c2"><stop offset="0%" stop-color="#00B87A"/></linearGradient>
  <linearGradient id="c3"><stop offset="0%" stop-color="#F59E0B"/></linearGradient>
