<svg id="root" viewBox="0 0 1100 620" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    .card-bg        { fill:#FFFBFE; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.10)); }
    .card-title     { font-size:18px; font-weight:500; fill:#1C1B1F; letter-spacing:-0.2px; }
    .card-subtitle  { font-size:11px; fill:#79747E; }
    .tick-label     { font-size:10px; fill:#79747E; }
    .legend-label   { font-size:11px; fill:#1C1B1F; }
    .grid-line      { stroke:#E7E0EC; stroke-width:1; fill:none; }
    .axis-line      { stroke:#79747E; stroke-width:1.5; fill:none; }
    .legend-bg      { fill:#E7E0EC; stroke:#79747E; stroke-width:0.5; }
    .legend-divider { stroke:#79747E; stroke-width:0.5; opacity:0.3; }
    .legend-title   { font-size:10px; fill:#79747E; font-weight:500; }
    .footer         { font-size:10px; fill:#79747E; }
    .toggle-wrap    { cursor:pointer; }
    .toggle-track   { fill:#E7E0EC; }
    .toggle-thumb   { fill:#ffffff; }
    .toggle-label   { font-size:11px; font-weight:500; fill:#49454F; }
    .print-track    { fill:#E7E0EC; transition:fill 0.3s; }
    .print-thumb    { fill:#ffffff; }
    .print-label    { font-size:11px; font-weight:500; fill:#49454F; }
    .legend-value   { font-size:11px; fill:#1C1B1F; font-weight:500; opacity:0; transition:opacity 0.2s; }
    svg.print .legend-value { opacity:1; }

    /* Standard palette */
    .series-1 { fill:#00D4E8; stroke:#00D4E8; } .series-2 { fill:#00B87A; stroke:#00B87A; }
    .series-3 { fill:#F59E0B; stroke:#F59E0B; } .series-4 { fill:#F43F5E; stroke:#F43F5E; }
    .series-5 { fill:#8B5CF6; stroke:#8B5CF6; } .series-6 { fill:#3B82F6; stroke:#3B82F6; }
    .series-7 { fill:#0D9488; stroke:#0D9488; } .series-8 { fill:#64748B; stroke:#64748B; }

    svg.dark .series-1 { fill:#22D3EE; stroke:#22D3EE; } svg.dark .series-2 { fill:#10B981; stroke:#10B981; }
    svg.dark .series-3 { fill:#FBB724; stroke:#FBB724; } svg.dark .series-4 { fill:#FB6181; stroke:#FB6181; }
    svg.dark .series-5 { fill:#A78BFA; stroke:#A78BFA; } svg.dark .series-6 { fill:#60A5FA; stroke:#60A5FA; }
    svg.dark .series-7 { fill:#2DD4BF; stroke:#2DD4BF; } svg.dark .series-8 { fill:#94A3B8; stroke:#94A3B8; }

    /* Standard animation — rAF driven, no SMIL */
    .bub-g { opacity:0; }

    /* Hover */
    .data-item        { cursor:pointer; }
    .data-tip         { opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
    .data-item.active .data-tip { opacity:1; }
    .data-layer.ready.hovering .data-item        { opacity:0.20; transition:opacity 0.2s ease; }
    .data-layer.ready.hovering .data-item.active { opacity:1; }
    svg.print .data-tip { opacity:0 !important; }

    .tip-bg     { fill:#FFFBFE; }
    .tip-border { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .tip-tail   { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .tip-value  { fill:#1C1B1F; font-size:13px; font-weight:600; }
    .tip-label  { fill:#49454F; font-size:10px; }

    svg.dark .card-bg        { fill:#1C1B1F; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.25)); }
    svg.dark .card-title     { fill:#E6E0E9; }
    svg.dark .tick-label, svg.dark .card-subtitle { fill:#938F99; }
    svg.dark .legend-label, svg.dark .legend-value { fill:#E6E0E9; }
    svg.dark .grid-line      { stroke:#49454F; }
    svg.dark .axis-line      { stroke:#938F99; }
    svg.dark .legend-bg      { fill:#49454F; stroke:#938F99; }
    svg.dark .legend-divider { stroke:#938F99; }
    svg.dark .legend-title   { fill:#938F99; }
    svg.dark .footer         { fill:#938F99; }
    svg.dark .tip-bg         { fill:#1C1B1F; }
    svg.dark .tip-border     { fill:#1C1B1F; stroke:#938F99; }
    svg.dark .tip-tail       { fill:#1C1B1F; stroke:#938F99; stroke-width:1; }
    svg.dark .tip-value      { fill:#E6E0E9; }
    svg.dark .tip-label      { fill:#CAC4D0; }
    svg.dark .toggle-track, svg.dark .print-track { fill:#49454F; }
    svg.dark .toggle-label, svg.dark .print-label { fill:#CAC4D0; }
    .border-dark  { display:none; }
    .border-light { display:block; }
    svg.dark .border-dark  { display:block; }
    svg.dark .border-light { display:none; }
  </style>
</defs>

