</script>
<defs>
<style>
  @import url('chart-shared.css');
  /* prevent first paint in wrong color before shared css load */
  svg {
    --critical-legend-text: #1C1B1F;
    --critical-legend-muted: #79747E;
    --critical-legend-panel: #E7E0EC;
    --critical-legend-stroke: #79747E;
    --critical-tile-label: #FFFFFF;
    --critical-tile-sub: rgba(255,255,255,0.80);
  }
  svg.dark {
    --critical-legend-text: #E6E0E9;
    --critical-legend-muted: #938F99;
    --critical-legend-panel: #49454F;
    --critical-legend-stroke: #938F99;
    --critical-tile-label: #FFFFFF;
    --critical-tile-sub: rgba(255,255,255,0.80);
  }
  .legend-bg, .legend-panel { fill: var(--critical-legend-panel); stroke: var(--critical-legend-stroke); }
  .legend-title, .legend-heading { fill: var(--critical-legend-muted); }
  .legend-label, .legend-value, .legend-row-label, .legend-row-value { fill: var(--critical-legend-text); }
  .tile-label { fill: var(--critical-tile-label); }
  .tile-sub { fill: var(--critical-tile-sub); }
  .tile-node { opacity: 0; }
  .tile-node.visible { opacity: 1; }
</style>
</defs>


