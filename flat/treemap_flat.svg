    <path class="bub-bdr"  d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$55M</text>
