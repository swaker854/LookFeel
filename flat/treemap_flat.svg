<!-- ═══════════════════════════════════════
     BUBBLE OVERLAY — rendered last so always on top.
     Each bubble is a single unified path (fill + stroke together)
     so there's no rect behind a path causing white bleed.
     The tip triangle is drawn with a filled+stroked path that
     exactly connects to the bottom of the rounded rect.
     ═══════════════════════════════════════ -->
<!--
  Bubble anatomy (origin = tip point at bottom):
    Rounded rect: top-left corner at (-W, -H-TH) size 2W × H, rx=9
    Tip triangle: from (-8, -TH) → (0, 0) → (8, -TH)
    TH = tip height = 10, H = box height = 38, W = half-width

  We draw ONE closed path for fill, then same path again for stroke.
  No separate <rect> that would have a wider fill footprint.

  Bubble positions are centre-x of the tile, top edge of tile (y = tile.y)
-->

<g id="bubble-overlay">

  <!-- bub5 Violet  cx=207  tile-top=90  → tip at (207, 90) -->
  <g class="bubble" id="bub5" transform="translate(207,90)">
    <!-- fill layer -->
    <path class="bub-fill" d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <!-- stroke layer (no fill so it doesn't re-cover) -->
    <path class="bub-bdr" d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$79M</text>
    <text x="0" y="-19" text-anchor="middle" dominant-baseline="central" class="bub-lbl">Violet · 15.6%</text>
  </g>

  <!-- bub1 Cyan  cx=477  tile-top=90 -->
  <g class="bubble" id="bub1" transform="translate(477,90)">
    <path class="bub-fill" d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <path class="bub-bdr"  d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$72M</text>
    <text x="0" y="-19" text-anchor="middle" dominant-baseline="central" class="bub-lbl">Cyan · 14.2%</text>
  </g>

  <!-- bub2 Emerald  cx=728  tile-top=90 -->
  <g class="bubble" id="bub2" transform="translate(728,90)">
    <path class="bub-fill" d="M-8,-10 L-37,-10 Q-46,-10 -46,-19 L-46,-39 Q-46,-48 -37,-48 L37,-48 Q46,-48 46,-39 L46,-19 Q46,-10 37,-10 L8,-10 L0,0 Z"/>
    <path class="bub-bdr"  d="M-8,-10 L-37,-10 Q-46,-10 -46,-19 L-46,-39 Q-46,-48 -37,-48 L37,-48 Q46,-48 46,-39 L46,-19 Q46,-10 37,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$68M</text>
    <text x="0" y="-19" text-anchor="middle" dominant-baseline="central" class="bub-lbl">Emerald · 13.4%</text>
  </g>

  <!-- bub6 Blue  cx=203  tile-top=305 -->
  <g class="bubble" id="bub6" transform="translate(203,305)">
    <path class="bub-fill" d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <path class="bub-bdr"  d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$64M</text>
    <text x="0" y="-19" text-anchor="middle" dominant-baseline="central" class="bub-lbl">Blue · 12.6%</text>
  </g>

  <!-- bub7 Teal  cx=469  tile-top=305 -->
  <g class="bubble" id="bub7" transform="translate(469,305)">
    <path class="bub-fill" d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <path class="bub-bdr"  d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$61M</text>
