<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
var svg   = document.getElementById('root');
  var dataLayerEl = document.getElementById('data-layer');
  var gridEl = document.getElementById('tm-grid');

  /* §2 isDark before all build/animation code */

  var tiles = Array.prototype.slice.call(dataLayerEl.querySelectorAll('.tm-tile'));

  /* §3 A1 canonical — animation fired via inline style.animation (no fill-mode).
     animationend clears style.animation and adds .visible; CSS .tm-tile.visible { opacity:1 }
     owns the stable state. Hover gates on .ready. No .tm-pre class, no !important.
     Duration: 0.8s (fixed). Stagger: min(0.25, 1/count). Easing: ease-out. */
  var count      = tiles.length;
  var stagger    = Math.min(0.25, 1.0 / count);
  var lastDelay  = (count - 1) * stagger;
  var readyDelay = (lastDelay + 0.8 + 0.1) * 1000;

  tiles.forEach(function(tile, i) {
    tile.style.animation = 'tileFade 0.8s ease-out ' + (i * stagger).toFixed(3) + 's';
    tile.addEventListener('animationend', function handler() {
      tile.removeEventListener('animationend', handler);
      tile.style.animation = 'none';
      tile.classList.add('visible');
    }, { once: true });
  });

  if (gridEl) {
    gridEl.style.animation = 'tileFade 0.8s ease-out 0s';
    gridEl.addEventListener('animationend', function handler() {
      gridEl.removeEventListener('animationend', handler);
      gridEl.style.animation = 'none';
      gridEl.classList.add('visible');
    }, { once: true });
  }

  setTimeout(function() { dataLayerEl.classList.add('ready'); }, readyDelay);

  /* §4 hover — adjacent tiles: container-level mouseleave prevents flicker.
     Stale-clear on every mouseenter. */
  tiles.forEach(function(tile) {
    var bub = document.getElementById(tile.getAttribute('data-bubble'));
    tile.addEventListener('mouseenter', function() {
      tiles.forEach(function(t) {
        t.classList.remove('hovered');
        var b = document.getElementById(t.getAttribute('data-bubble'));
        if (b) b.style.opacity = '';
      });
      dataLayerEl.classList.add('hovering');
      tile.classList.add('hovered');
      if (bub) bub.style.opacity = '1';
    });
  });
  dataLayerEl.addEventListener('mouseleave', function() {
    tiles.forEach(function(t) {
      t.classList.remove('hovered');
      var b = document.getElementById(t.getAttribute('data-bubble'));
      if (b) b.style.opacity = '';
    });
    dataLayerEl.classList.remove('hovering');
  });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>

