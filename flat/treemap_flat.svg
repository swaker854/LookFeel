    <path class="bub-bdr"  d="M-8,-10 L-33,-10 Q-42,-10 -42,-19 L-42,-39 Q-42,-48 -33,-48 L33,-48 Q42,-48 42,-39 L42,-19 Q42,-10 33,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$48M</text>
    <text x="0" y="-19" text-anchor="middle" dominant-baseline="central" class="bub-lbl">Other · 9.5%</text>
  </g>

</g>

<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.getElementById('root');

  var lightColors = { 1:'#00D4E8', 2:'#00B87A', 3:'#F59E0B', 4:'#F43F5E', 5:'#8B5CF6', 6:'#3B82F6', 7:'#0D9488', 8:'#64748B' };
  var darkColors  = { 1:'#22D3EE', 2:'#10B981', 3:'#FBB724', 4:'#FB6181', 5:'#A78BFA', 6:'#60A5FA', 7:'#2DD4BF', 8:'#94A3B8' };

  function swapColors(dark) {
    var palette = dark ? darkColors : lightColors;
    for (var id in palette) {
      var r = document.getElementById('tmr' + id);
      if (r) r.setAttribute('fill', palette[id]);
    }
  }

  /* ── Option B: spring scale from center, staggered 110ms ── */
  var tileOrder = ['tg5','tg1','tg2','tg6','tg7','tg3','tg4','tg8'];

  function runEntrance() {
    tileOrder.forEach(function(id, i) {
      var el = document.getElementById(id);
      if (!el) return;
      el.style.transition = 'none';
      el.style.transform  = 'scale(0)';
      el.style.opacity    = '0';
      setTimeout(function() {
        el.style.transition = 'transform 1.2s cubic-bezier(0.34,1.4,0.64,1), opacity 0.35s ease';
        el.style.transform  = 'scale(1)';
        el.style.opacity    = '1';
      }, 80 + i * 110);
    });
  }

  runEntrance();

  /* ── Hover: show matching bubble from overlay ── */
  var tiles = svg.querySelectorAll('.tm-tile');
  tiles.forEach(function(tile) {
    var bubId = tile.getAttribute('data-bubble');
    var bub   = bubId ? document.getElementById(bubId) : null;

    tile.addEventListener('mouseenter', function() {
      if (bub) bub.style.opacity = '1';
    });
    tile.addEventListener('mouseleave', function() {
      if (bub) bub.style.opacity = '0';
    });
  });

  /* ── Dark / print toggles ── */
  function setMode(wantDark) {
    var currently = svg.classList.contains('dark');
    if (wantDark === currently) return;
    var thumb = document.getElementById('tthumb');
    var lbl   = document.getElementById('tlabel');
    if (wantDark) {
      svg.classList.add('dark');
      if (thumb) thumb.setAttribute('cx','52');
      if (lbl)   lbl.textContent = 'Light';
    } else {
      svg.classList.remove('dark');
      if (thumb) thumb.setAttribute('cx','16');
      if (lbl)   lbl.textContent = 'Dark';
    }
    swapColors(wantDark);
  }

  document.getElementById('dark-toggle').addEventListener('click', function() {
    setMode(!svg.classList.contains('dark'));
  });
  document.getElementById('print-toggle').addEventListener('click', function() {
    var thumb = document.getElementById('pthumb'), lbl = document.getElementById('plabel');
    if (svg.classList.toggle('print')) { thumb.setAttribute('cx','52'); lbl.textContent='Screen'; }
    else                               { thumb.setAttribute('cx','16'); lbl.textContent='Print';  }
  });

  window.setMode = setMode;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setMode') setMode(e.data.dark);
  });

  (function() {
    setMode(window.location.href.indexOf('theme=dark') !== -1);
  })();
})();
]]></script>
</svg>
