<!--
  Bubble construction — identical pattern to bar chart:
  1. tip-bg  plain fill rect (no stroke) — background
  2. tip-border open path (no Z) — U-shape border, top+sides+bottom stubs, gap left for tail
  3. tip-tail small filled+stroked triangle — the tail
-->
