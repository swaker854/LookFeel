    <path class="bub-bdr"  d="M-8,-10 L-35,-10 Q-44,-10 -44,-19 L-44,-39 Q-44,-48 -35,-48 L35,-48 Q44,-48 44,-39 L44,-19 Q44,-10 35,-10 L8,-10 L0,0 Z"/>
    <text x="0" y="-33" text-anchor="middle" dominant-baseline="central" class="bub-val">$60M</text>
