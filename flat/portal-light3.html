<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Dashboard Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }

  /* CSS tokens for light portal */
  :root {
    --bg:           #f3eef6;
    --bg-surface:   #fffbfe;
    --bg-surface-2: #f8f3fa;
    --border:       rgba(121,116,126,0.22);
    --border-cyan:  rgba(0,184,122,0.30);
    --text-primary: #1C1B1F;
    --text-sec:     #49454F;
    --text-muted:   #79747E;
    --text-dim:     #B1A9B6;
    --accent:       #00B87A;
    --active-bg:    rgba(0,184,122,0.12);
    --hover-bg:     rgba(121,116,126,0.08);
  }

  .portal {
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    background: var(--bg);
    color: var(--text-sec);
  }

  /* Top nav — flat, no shadows or glows */
  .topnav {
    display: flex; align-items: center;
    height: 44px; padding: 0 12px;
    flex-shrink: 0; gap: 4px;
    background: var(--bg-surface-2);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    margin-right: 4px; flex-shrink: 0;
  }
  .nav-logo svg { width: 20px; height: 20px; }

  .nav-btn {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--hover-bg); }
  .nav-btn svg { width: 14px; height: 14px; }

  /* Active state — flat, border only, no inset shadow or glow */
  .nav-btn.active {
    background: var(--active-bg);
    border: 0.5px solid var(--border-cyan);
  }

  .nav-spacer { flex: 1; }

  .nav-right { display: flex; align-items: center; gap: 4px; }
  .nav-right-btn {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .nav-right-btn:hover { background: var(--hover-bg); }
  .nav-right-btn svg { width: 13px; height: 13px; }

  .nav-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bg-surface-2);
    border: 0.5px solid var(--border-cyan);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .nav-avatar svg { width: 14px; height: 14px; fill: var(--text-sec); }

  /* Breadcrumb bar */
  .breadcrumb-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 0 12px; height: 32px; flex-shrink: 0;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb-label { font-size: 11px; font-weight: 500; color: var(--text-sec); }
  .breadcrumb-sep   { color: var(--text-dim); font-size: 11px; }
  .breadcrumb-spacer { flex: 1; }
  .breadcrumb-action {
    width: 22px; height: 22px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
  }
  .breadcrumb-action:hover { background: var(--hover-bg); }
  .breadcrumb-action svg { width: 12px; height: 12px; }

  /* Body */
  .body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* Left panel */
  .left-panel {
    width: 220px; flex-shrink: 0;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .panel-search-row {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .panel-search {
    flex: 1; font-size: 11px; font-family: inherit;
    padding: 4px 8px; border-radius: 5px;
    border: 0.5px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text-sec); outline: none; min-width: 0;
  }
  .panel-search::placeholder { color: var(--text-muted); }
  .panel-search:focus { border-color: var(--border-cyan); }

  .panel-icon-btn {
    width: 24px; height: 24px; border-radius: 5px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg-surface);
    border: 0.5px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .panel-icon-btn:hover { background: var(--hover-bg); }
  .panel-icon-btn svg { width: 11px; height: 11px; }

  /* Tree */
  .tree { flex: 1; overflow-y: auto; padding: 4px 0; }
  .tree::-webkit-scrollbar { width: 3px; }
  .tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tree-section {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 10px; font-size: 11px;
    color: var(--text-muted); cursor: pointer;
    transition: background 0.12s;
  }
  .tree-section:hover { background: var(--hover-bg); color: var(--text-sec); }
  .tree-chevron { font-size: 8px; color: var(--text-dim); flex-shrink: 0; }
  .tree-section svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.5; }

  .tree-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 24px; font-size: 11px;
    color: var(--text-muted); cursor: pointer;
    transition: background 0.12s; position: relative;
  }
  .tree-item:hover { background: var(--hover-bg); color: var(--text-sec); }
  .tree-item svg { width: 10px; height: 10px; flex-shrink: 0; opacity: 0.4; }

  .tree-item.active {
    background: var(--active-bg);
    color: var(--text-primary);
    font-weight: 500;
  }
  /* Flat accent bar — no glow */
  .tree-item.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--accent);
  }
  .tree-item.active svg { opacity: 0.9; }

 /* Content grid - Fixed row behavior */
  .content {
    flex: 1;
    overflow-y: auto; /* Enable vertical scrolling for the grid */
    padding: 12px;    /* Add a little breathing room */
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    grid-auto-rows: max-content; /* Row height matches the card height */
    gap: 12px;       /* Added a gap to prevent visual touching */
    background: var(--bg);
  }

  
  .chart-card {
    position: relative;
    border-radius: 12px; /* Slightly tighter radius for the portal look */
    overflow: hidden;
    width: 100%;
    aspect-ratio: 1100 / 620; /* This defines the height based on width */
    background: var(--bg-surface); /* Helps visualize the card bounds */
    border: 1px solid var(--border);
  }

  .chart-frame {
    width: 100%; height: 100%;
    border: none; outline: none;
    background: transparent;
    border-radius: 18px;
    display: block;
  }

  .chart-card-shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 0;
    background: var(--bg-surface);
  }

  .chart-card-shell.light {
    background: #f8f5fb;
    border-color: rgba(121, 116, 126, 0.28);
    box-shadow: 0 18px 40px rgba(28, 27, 31, 0.08);
  }

  .chart-shell-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .chart-card-shell.light .chart-shell-header {
    border-bottom-color: rgba(121, 116, 126, 0.18);
  }

  .chart-shell-copy {
    min-width: 0;
    display: grid;
    gap: 4px;
  }

  .chart-shell-title {
    font-size: 16px;
    line-height: 1.2;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chart-card-shell.light .chart-shell-title {
    color: #1c1b1f;
  }

  .chart-shell-subtitle {
    font-size: 11px;
    line-height: 1.4;
    color: rgba(138, 153, 176, 0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chart-card-shell.light .chart-shell-subtitle {
    color: #79747e;
  }

  .chart-shell-controls {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }

  .chart-shell-btn {
    min-width: 72px;
    height: 30px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.02);
    color: var(--text-sec);
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .chart-card-shell.light .chart-shell-btn {
    border-color: rgba(121, 116, 126, 0.28);
    background: rgba(121, 116, 126, 0.06);
    color: #49454f;
  }

  .chart-shell-btn:hover {
    background: rgba(255, 255, 255, 0.06);
  }

  .chart-card-shell.light .chart-shell-btn:hover {
    background: rgba(121, 116, 126, 0.12);
  }

  .chart-shell-btn.active {
    color: var(--text-primary);
    border-color: var(--border-cyan);
    background: rgba(0, 242, 255, 0.08);
  }

  .chart-card-shell.light .chart-shell-btn.active {
    color: #1c1b1f;
    border-color: rgba(0, 184, 122, 0.42);
    background: rgba(0, 184, 122, 0.12);
  }

  .chart-shell-body {
    min-height: 0;
    padding: 12px 10px 8px;
  }

  .chart-card-shell.light .chart-shell-body {
    background: linear-gradient(180deg, rgba(255, 251, 254, 0.96), rgba(245, 240, 248, 0.94));
  }

  .chart-card-shell .chart-frame {
    border-radius: 0;
    height: 100%;
  }

  .chart-shell-footer {
    padding: 12px 20px 16px;
    font-size: 10px;
    line-height: 1.5;
    letter-spacing: 0.15px;
    color: rgba(138, 153, 176, 0.78);
  }

  .chart-card-shell.light .chart-shell-footer {
    color: #79747e;
  }
</style>
</head>

<script>
  var defaultPalette = ['#00D4E8', '#00B87A', '#F59E0B', '#F43F5E', '#8B5CF6', '#3B82F6', '#0D9488', '#64748B'];
  var chartShellMeta = {
    'stepline_flat.svg': {
      title: 'Federal Funds Rate - Step Line',
      subtitle: '6 rate cycles · step line · hover to inspect',
      footer: 'Federal funds rate · step line chart · hover to inspect · print mode reveals values'
    },
    'jumpline_flat.svg': {
      title: 'Benchmark Rates by Region - Jump Line',
      subtitle: '3 series · quarterly · hover to inspect',
      footer: 'Benchmark rates by region · jump line chart · hover to inspect · print mode reveals values'
    },
    'steparea_flat.svg': {
      title: 'Cloud Spend by Department - Step Area',
      subtitle: '4 series · monthly · hover to inspect',
      footer: 'Cloud spend by department · step area chart · hover to inspect · print mode reveals values'
    },
    'tree_flat.svg': {
      title: 'Product Organisation - Tree',
      subtitle: '14 nodes · 4 levels · hover to inspect',
      footer: 'Product organisation · tree chart · hover to inspect · print mode reveals values'
    },
    'network_flat.svg': {
      title: 'Service Dependency Graph - Network',
      subtitle: '16 nodes · 24 edges · hover to explore',
      footer: 'Service dependency graph · network chart · hover to explore neighbourhood'
    },
    'circular_network_flat.svg': {
      title: 'Service Dependency Graph - Circular',
      subtitle: '16 nodes · 24 edges · circular layout',
      footer: 'Service dependency graph · circular network chart · hover to explore neighbourhood'
    },
    'circle_packing_flat.svg': {
      title: 'Shipping Mode by Orders - Packing',
      subtitle: '4 shipping classes · hover to inspect',
      footer: 'Shipping mode by orders · circle packing chart · hover to inspect · print mode reveals values'
    },
    'gantt_flat.svg': {
      title: 'Artemis Platform Roadmap - Gantt',
      subtitle: 'Apr-Sep 2026 · 6 teams · hover to inspect',
      footer: 'Artemis platform roadmap · gantt chart · hover to inspect · print mode reveals durations'
    },
    'funnel_flat.svg': {
      title: 'Sales Conversion Funnel',
      subtitle: 'Marketing to revenue pipeline · Q1 2026',
      footer: 'Sales conversion funnel · hover to inspect · print mode reveals values'
    }
  };

  function shellMarkup(title, subtitle, footer, src) {
    return '' +
      '<div class="chart-shell-header">' +
        '<div class="chart-shell-copy">' +
          '<div class="chart-shell-title">' + title + '</div>' +
          '<div class="chart-shell-subtitle">' + subtitle + '</div>' +
        '</div>' +
        '<div class="chart-shell-controls">' +
          '<button class="chart-shell-btn active" type="button" data-chart-mode>Light</button>' +
          '<button class="chart-shell-btn" type="button" data-chart-print>Print</button>' +
        '</div>' +
      '</div>' +
      '<div class="chart-shell-body">' +
        '<iframe class="chart-frame" src="' + src + '" scrolling="no" frameborder="0" data-chart-frame></iframe>' +
      '</div>' +
      '<div class="chart-shell-footer">' + footer + '</div>';
  }

  document.querySelectorAll('.chart-card').forEach(function (card) {
    var existingFrame = card.querySelector('iframe.chart-frame');
    if (!existingFrame) return;

    var src = existingFrame.getAttribute('src') || '';
    var base = src.split('?')[0];
    var meta = chartShellMeta[base];
    if (!meta) return;

    if (!card.hasAttribute('data-chart-shell')) {
      card.classList.add('chart-card-shell');
      card.setAttribute('data-chart-shell', '');
      card.innerHTML = shellMarkup(meta.title, meta.subtitle, meta.footer, src);
    }
  });

  document.querySelectorAll('[data-chart-shell]').forEach(function (card) {
    var frame = card.querySelector('[data-chart-frame]');
    var modeBtn = card.querySelector('[data-chart-mode]');
    var printBtn = card.querySelector('[data-chart-print]');
    var state = { dark: false, print: false };

    function paintButtons() {
      card.classList.toggle('light', !state.dark);
      modeBtn.classList.toggle('active', state.dark);
      modeBtn.textContent = state.dark ? 'Light' : 'Dark';
      printBtn.classList.toggle('active', state.print);
      printBtn.textContent = state.print ? 'Screen' : 'Print';
    }

    function syncFrame() {
      if (!frame || !frame.contentWindow) return;
      frame.contentWindow.postMessage({ type: 'setPalette', colors: defaultPalette }, '*');
      frame.contentWindow.postMessage({ type: 'setMode', dark: state.dark }, '*');
      frame.contentWindow.postMessage({ type: 'setPrint', print: state.print }, '*');
    }

    modeBtn.addEventListener('click', function () {
      state.dark = !state.dark;
      paintButtons();
      syncFrame();
    });

    printBtn.addEventListener('click', function () {
      state.print = !state.print;
      paintButtons();
      syncFrame();
    });

    frame.addEventListener('load', function () {
      syncFrame();
    });

    paintButtons();
  });
</script>
</body>
