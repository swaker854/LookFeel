
<svg id="root" viewBox="0 0 1100 620" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<defs>
  <clipPath id="chartclip">
    <rect x="68" y="96" width="782" height="412"/>
  </clipPath>
  <style>
    .bg-main   { fill:#FFFBFE; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.10)); }
    .ct        { font-size:18px; font-weight:500; fill:#1C1B1F; letter-spacing:-0.2px; }
    .cs        { font-size:11px; fill:#79747E; font-weight:400; }
    .an        { font-size:10px; fill:#79747E; font-weight:400; }
    .al        { font-size:10px; fill:#79747E; font-weight:500; }
    .lt        { font-size:11px; fill:#1C1B1F; font-weight:400; }
    .lv        { font-size:11px; fill:#1C1B1F; font-weight:500; }
    .lp        { font-size:10px; fill:#79747E; font-weight:400; }
    .gl        { stroke:#E7E0EC; stroke-width:1; }
    .bl        { stroke:#79747E; stroke-width:1.5; }
    .lgd-bg    { fill:#E7E0EC; stroke:#79747E; stroke-width:0.5; }
    .lgd-div   { stroke:#79747E; stroke-width:0.5; opacity:0.3; }
    .lgd-ttl   { font-size:10px; fill:#79747E; font-weight:500; letter-spacing:0.4px; }
    .footer    { font-size:10px; fill:#79747E; font-weight:400; }
    .t-wrap    { cursor:pointer; }
    .t-track   { fill:#E7E0EC; } .t-thumb { fill:#ffffff; }
    .t-label   { font-size:11px; font-weight:500; fill:#49454F; }
    .pt-track  { fill:#E7E0EC; transition:fill 0.3s; } .pt-thumb { fill:#ffffff; }
    .pt-label  { font-size:11px; font-weight:500; fill:#49454F; }
    .lgd-val   { opacity:0; transition:opacity 0.2s; }
    svg.print .lgd-val  { opacity:1; }
    svg.print .pt-track { fill:#d97316; }
    .tip-div   { stroke:#CAC4D0; stroke-width:1; }
    svg.dark .tip-div { stroke:#49454F; }
    .crosshair { stroke:#79747E; stroke-width:1; stroke-dasharray:4,3; opacity:0; transition:opacity 0.15s; }
    .tip       { opacity:0; pointer-events:none; transition:opacity 0.15s ease; }
    svg.print .tip { opacity:0 !important; }
    .bub-bg    { fill:#FFFBFE; }
    .bub-bdr   { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .bub-val   { fill:#1C1B1F; font-size:13px; font-weight:500; }
    .bub-lbl   { fill:#49454F; font-size:10px; font-weight:400; }

    /* ── standard palette ── */
    .bar-1 { fill:#00D4E8; stroke:#00D4E8; } .bar-2 { fill:#8B5CF6; stroke:#8B5CF6; }
    .bar-3 { fill:#00B87A; stroke:#00B87A; } .bar-4 { fill:#F59E0B; stroke:#F59E0B; }
    .bar-5 { fill:#64748B; stroke:#64748B; }
    svg.dark .bar-1 { fill:#22D3EE; stroke:#22D3EE; } svg.dark .bar-2 { fill:#A78BFA; stroke:#A78BFA; }
    svg.dark .bar-3 { fill:#10B981; stroke:#10B981; } svg.dark .bar-4 { fill:#FBB724; stroke:#FBB724; }
    svg.dark .bar-5 { fill:#94A3B8; stroke:#94A3B8; }

    /* ── onload animation — uses both because .bb and .col-g are separate
       nested elements: both fill-mode only affects .bb opacity,
       hover dimming targets .col-g — no conflict ── */
    @keyframes barFadeIn { from{opacity:0} to{opacity:1} }
    .bb { animation:barFadeIn 0.8s ease-out both; }
    .b1 { animation-delay:0.00s; } .b2 { animation-delay:0.25s; }
    .b3 { animation-delay:0.50s; } .b4 { animation-delay:0.75s; }
    .b5 { animation-delay:1.00s; } .b6 { animation-delay:1.25s; }
    .b7 { animation-delay:1.50s; } .b8 { animation-delay:1.75s; }

    /* ── hover — no .ready gate needed: .bb and .col-g are separate elements,
       animation never touches .col-g opacity ── */
    .col-g .seg { transition:opacity 0.2s ease; }
    .chart-g.hovering .col-g .seg        { opacity:0.20; }
    .chart-g.hovering .col-g.active .seg { opacity:1; }
    svg.print .chart-g.hovering .col-g .seg { opacity:1 !important; }

    svg.dark .bg-main   { fill:#1C1B1F; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.25)); }
    svg.dark .ct        { fill:#E6E0E9; } svg.dark .cs  { fill:#938F99; }
    svg.dark .an        { fill:#938F99; } svg.dark .al  { fill:#938F99; }
    svg.dark .lt        { fill:#E6E0E9; } svg.dark .lv  { fill:#E6E0E9; }
    svg.dark .lp        { fill:#938F99; }
    svg.dark .gl        { stroke:#49454F; } svg.dark .bl { stroke:#938F99; }
    svg.dark .lgd-bg    { fill:#49454F; stroke:#938F99; }
    svg.dark .lgd-div   { stroke:#938F99; } svg.dark .lgd-ttl { fill:#938F99; }
    svg.dark .footer    { fill:#938F99; }
    svg.dark .t-track   { fill:#49454F; } svg.dark .t-label  { fill:#CAC4D0; }
    svg.dark .pt-track  { fill:#49454F; } svg.dark .pt-label { fill:#CAC4D0; }
    svg.dark.print .pt-track { fill:#d97316; }
    svg.dark .crosshair { stroke:#938F99; }
    svg.dark .bub-bg    { fill:#1C1B1F; }
    svg.dark .bub-bdr   { fill:#1C1B1F; stroke:#938F99; }
    svg.dark .bub-val   { fill:#E6E0E9; }
    svg.dark .bub-lbl   { fill:#CAC4D0; }
    .border-dark  { display:none; } .border-light { display:block; }
    svg.dark .border-dark  { display:block; } svg.dark .border-light { display:none; }
  </style>
</defs>

