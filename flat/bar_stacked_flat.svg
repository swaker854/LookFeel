  <script href="chart-shared.js"></script>
  <script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl = svgEl.querySelector('.data-layer');
    var dataItemEls = ctx.$$all('.data-item');
    var legendRoot = svgEl.querySelector('#legend-root');
    var dataBodyEls = ctx.$$all('.data-body');

    dataBodyEls.forEach(function (dataBody, index) {
      var delay = ctx.getStaggerDelay(index, dataBodyEls.length, null, svgEl);
      ctx.animateAndMarkVisible(
        dataBody,
        'dataFadeIn var(--chart-fade-duration, 0.8s) ease-out ' + delay + 's'
      );
    });

    var quarters = ["Q1 '22","Q2 '22","Q3 '22","Q4 '22","Q1 '23","Q2 '23","Q3 '23","Q4 '23"];
    var xs   = [126.9, 221.8, 316.7, 411.6, 506.4, 601.3, 696.2, 791.1];
    var colW = 36;
    var series = [
      { label:'Cyan',    cls:'series-1', vals:[38,42,46,50,55,60,66,72] },
      { label:'Emerald', cls:'series-2', vals:[32,35,38,41,45,50,56,62] },
      { label:'Amber',   cls:'series-3', vals:[18,20,21,23,25,27,31,35] },
      { label:'Rose',    cls:'series-4', vals:[11,12,13,14,15,17,19,22] },
      { label:'Violet',  cls:'series-5', vals:[10,11,12,13,14,16,17,19] },
    ];
    var totals = xs.map(function(_,qi){
      return series.reduce(function(s,sr){ return s+sr.vals[qi]; }, 0);
    });

    var hitLayer = svgEl.querySelector('#hit-layer');
    var tipLayer = svgEl.querySelector('#tip-layer');

    ctx.initStackedSummaryTooltip({
      xs: xs,
      quarters: quarters,
      series: series,
      totals: totals,
      tipLayer: tipLayer,
      hitLayer: hitLayer,
      plotL: 68,
      plotR: 850,
      plotT: 100,
      plotB: 500,
      anchorY: 304,
      hitTop: 100,
      hitHeight: 408,
      hitHalfWidth: colW,
      onEnter: function (qi, sp, tipG, ch) {
        var itemEl = svgEl.querySelector('#data-item-' + qi);
        ctx.activateExclusive(dataItemEls, itemEl);
        ctx.setOpacity(tipG, 1);
        ctx.setOpacity(ch, 1);
        dataLayerEl.classList.add('hovering');
      },
      onLeave: function (qi, tipG, ch) {
        var itemEl = svgEl.querySelector('#data-item-' + qi);
        ctx.setOpacity(tipG, null);
        ctx.setOpacity(ch, null);
        dataLayerEl.classList.remove('hovering');
        if (itemEl) itemEl.classList.remove('active');
      }
    });

    ctx.initStandardLegend({
      legendEl: legendRoot,
      title: 'SERIES',
      rowGap: 48,
      items: [
        { cls: 'series-1', label: 'Cyan', value: '$72M' },
        { cls: 'series-2', label: 'Emerald', value: '$62M' },
        { cls: 'series-3', label: 'Amber', value: '$35M' },
        { cls: 'series-4', label: 'Rose', value: '$22M' },
        { cls: 'series-5', label: 'Violet', value: '$19M' }
      ]
    });

    ctx.markReadyAfterReveal(dataLayerEl, {
      delays: dataBodyEls.map(function (_, index) {
        return ctx.getStaggerDelay(index, dataBodyEls.length, null, svgEl);
      }),
      duration: 0.8,
      buffer: 0.1
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
