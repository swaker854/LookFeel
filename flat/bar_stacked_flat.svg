<defs>
  <clipPath id="chartclip">
    <rect x="68" y="96" width="782" height="412"/>
  </clipPath>
  <style>
    @import url('chart-shared.css');

    @keyframes dataFadeIn { from{opacity:0} to{opacity:1} }
    .data-body { animation:dataFadeIn 0.8s ease-out both; }
    .stagger-1 { animation-delay:0.00s; } .stagger-2 { animation-delay:0.25s; }
    .stagger-3 { animation-delay:0.50s; } .stagger-4 { animation-delay:0.75s; }
    .stagger-5 { animation-delay:1.00s; } .stagger-6 { animation-delay:1.25s; }
    .stagger-7 { animation-delay:1.50s; } .stagger-8 { animation-delay:1.75s; }
    .crosshair { stroke:#79747E; stroke-width:1; stroke-dasharray:4,3; opacity:0; transition:opacity 0.15s; }
    svg.dark .crosshair { stroke:#938F99; }
    .tip       { opacity:0; pointer-events:none; transition:opacity 0.15s ease; }
    svg.print .tip { opacity:0 !important; }

    .data-item .seg { transition:opacity 0.2s ease; }
    .chart-container.hovering .data-item .seg        { opacity:0.20; }
    .chart-container.hovering .data-item.active .seg { opacity:1; }
    svg.print .chart-container.hovering .data-item .seg { opacity:1 !important; }
  </style>
</defs>

