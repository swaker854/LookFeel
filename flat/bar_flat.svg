  <script href="chart-shared.js"></script>
  <script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl = svgEl.querySelector('.data-layer');
    var dataBodyEls = ctx.$$all('.data-body');

    dataBodyEls.forEach(function (dataBody, index) {
      var delay = ctx.getStaggerDelay(index, dataBodyEls.length, null, svgEl);
      ctx.animateAndMarkVisible(
        dataBody,
        'dataFadeIn var(--chart-fade-duration, 0.8s) ease-out ' + delay + 's'
      );
    });

    ctx.initSideBubbles({
      itemSelector: '.data-item',
      tipSelector: '.data-tip',
      tipLayerSelector: '#tip-layer',
      anchorXAttr: 'data-item-cx',
      anchorYAttr: 'data-item-top',
      anchorInset: 32,
      plotL: 42,
      plotR: 840,
      plotT: 100,
      plotB: 500,
      lineHeights: [70, 70],
      minWidth: 220,
      paddingX: 20,
      paddingY: 30
    });

    /* Hover data layer dims; tips live in #tip-layer so JS controls opacity directly */
    var dataItemEls = ctx.$$all('.data-item');
    ctx.initExclusiveHoverTips(dataLayerEl, dataItemEls, {
      leaveTarget: dataLayerEl
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
