<script type="text/javascript"><![CDATA[
(function() {
  var svg  = document.getElementById('root');
  var caEl = document.querySelector('.ca');

  /* §2 — isDark hoisted before all other code */
  var isDark = false;

  /* §5 — initBubbles: position tooltip geometry via getBBox(); CSS owns show/hide */
  function initBubbles() {
    var pad = 20, bh = 38, rx = 9, tw = 8, tail = 8;
    Array.prototype.slice.call(document.querySelectorAll('.bw')).forEach(function(bw) {
      var barCx  = parseFloat(bw.getAttribute('data-bar-cx'));
      var barTop = parseFloat(bw.getAttribute('data-bar-top'));
      var bub    = bw.querySelector('.bubble');
      var texts  = bub.querySelectorAll('text');
      var bgRect = bub.querySelector('rect');
      var paths  = bub.querySelectorAll('path');
      var bdrPath = paths[0], tipPath = paths[1];

      /* place text at known position before measuring */
      Array.prototype.forEach.call(texts, function(t) {
        t.setAttribute('x', '0'); t.setAttribute('y', '0');
      });

      var hw = Math.max(
        texts[0].getBBox().width + pad,
        texts[1].getBBox().width + pad,
        60
      ) / 2;

      var tx = Math.max(hw + 8, Math.min(barCx, 1092 - hw - 8));
      var bB = barTop - tail;
      var bT = bB - bh;
      var bL = tx - hw, bR = tx + hw;

      bgRect.setAttribute('x', bL); bgRect.setAttribute('y', bT);
      bgRect.setAttribute('width', hw * 2); bgRect.setAttribute('height', bh);

      bdrPath.setAttribute('d',
        'M'+(tx+tw)+','+bB+
        ' L'+(bR-rx)+','+bB+' Q'+bR+','+bB+' '+bR+','+(bB-rx)+
        ' L'+bR+','+(bT+rx)+' Q'+bR+','+bT+' '+(bR-rx)+','+bT+
        ' L'+(bL+rx)+','+bT+' Q'+bL+','+bT+' '+bL+','+(bT+rx)+
        ' L'+bL+','+(bB-rx)+' Q'+bL+','+bB+' '+(bL+rx)+','+bB+
        ' L'+(tx-tw)+','+bB
      );

      tipPath.setAttribute('d',
        'M'+(tx-tw)+','+bB+' L'+tx+','+barTop+' L'+(tx+tw)+','+bB
      );

      texts[0].setAttribute('x', tx); texts[0].setAttribute('y', bT + bh * 0.32);
      texts[1].setAttribute('x', tx); texts[1].setAttribute('y', bT + bh * 0.72);
    });
  }
  initBubbles();

  /* §3 — animation is pure CSS @keyframes (A2); no JS needed */

  /* §4 — Hover: CSS-driven via .bw.active .bubble; JS only manages .active and .hovering */
  var bwEls = Array.prototype.slice.call(document.querySelectorAll('.bw'));

  bwEls.forEach(function(bw) {
    bw.addEventListener('mouseenter', function() {
      caEl.classList.add('hovering');
      bwEls.forEach(function(x) { x.classList.remove('active'); }); /* clear stale */
      bw.classList.add('active');
    });
    bw.addEventListener('mouseleave', function() {
      bw.classList.remove('active');
      caEl.classList.remove('hovering');
    });
  });

  /* §2 — Dark mode toggle */
  function setMode(wantDark) {
    if (wantDark === isDark) return;
    isDark = wantDark;
    var thumb = document.getElementById('tthumb');
    var lbl   = document.getElementById('tlabel');
    if (wantDark) {
      svg.classList.add('dark');
      if (thumb) thumb.setAttribute('cx', '52');
      if (lbl)   lbl.textContent = 'Light';
    } else {
      svg.classList.remove('dark');
      if (thumb) thumb.setAttribute('cx', '16');
      if (lbl)   lbl.textContent = 'Dark';
    }
  }

  document.getElementById('dark-toggle').addEventListener('click', function() { setMode(!isDark); });
  document.getElementById('print-toggle').addEventListener('click', function() {
    var thumb = document.getElementById('pthumb'), lbl = document.getElementById('plabel');
    if (svg.classList.toggle('print')) { thumb.setAttribute('cx','52'); lbl.textContent='Screen'; }
    else                               { thumb.setAttribute('cx','16'); lbl.textContent='Print'; }
  });

  window.setMode = setMode;
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setMode') setMode(e.data.dark);
  });
  setMode(window.location.href.indexOf('theme=dark') !== -1);
})();
]]></script>
</svg>
