<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl  = svgEl.querySelector('#data-layer');
    var dotsLayer    = svgEl.querySelector('#dots-layer');
    var tipLayer     = svgEl.querySelector('#tip-layer');

    var series = [
      { id:1, cls:'series-1', label:'Cyan',    vals:[32,38,41,48,52,61,68,72], ys:[372,348,336,308,292,256,228,212] },
      { id:2, cls:'series-2', label:'Emerald', vals:[28,31,35,40,44,49,55,62], ys:[388,376,360,340,324,304,280,252] },
      { id:3, cls:'series-3', label:'Amber',   vals:[18,22,25,29,25,28,31,35], ys:[428,412,400,384,400,388,376,360] },
      { id:4, cls:'series-4', label:'Rose',    vals:[12,15,18,14,17,20,16,22], ys:[452,440,428,444,432,420,436,412] },
      { id:5, cls:'series-5', label:'Violet',  vals:[10,13,11,15,13,17,15,19], ys:[460,448,456,440,448,432,440,424] },
    ];

    var defs = svgEl.querySelector('defs');
    var plot = { x:68, y:100, width:772, height:400 };
    var syncGradients = ctx.initSeriesVerticalGradients({
      defs: defs,
      series: series,
      topOpacities: [0.28, 0.24, 0.20, 0.18, 0.14],
      bottomOpacity: 0.02,
      gradientIdPrefix: 'a',
      areaIdPrefix: 'area-'
    });
    var revealTiming = ctx.getStaggerTiming(series.length, { duration: 1.2 }, svgEl);

    var quarters = ["Q1 '22","Q2 '22","Q3 '22","Q4 '22","Q1 '23","Q2 '23","Q3 '23","Q4 '23"];
    var xs = [68,171,274,377,480,583,686,789];
    var plotL = 42, plotR = 840, plotT = 100, plotB = 500;
    var dotTravelSeconds = 0.96;

    var el = ctx.el;

    series.forEach(function(s, i) {
      var area = svgEl.querySelector('#area-' + s.id);
      var line = svgEl.querySelector('#line-' + s.id);
      var revealDelay = ctx.getStaggerDelay(i, series.length, null, svgEl);
      if (area) {
        ctx.initAreaClipReveal({
          defs: defs,
          area: area,
          clipId: 'line-area-reveal-' + s.id,
          x: plot.x,
          y: plot.y,
          width: plot.width,
          height: plot.height,
          delay: revealDelay,
          duration: 1200
        });
      }
      if (line) ctx.initStrokeReveal(line, { delay: revealDelay });
    });

    ctx.initPointSeriesHover({
      series: series,
      xs: xs,
      dotsLayer: dotsLayer,
      tipLayer: tipLayer,
      hoverLayer: dataLayerEl,
      plotL: plotL,
      plotR: plotR,
      plotT: plotT,
      plotB: plotB,
      quarters: quarters,
      lineSelector: '#line-{id}',
      areaSelector: '#area-{id}',
      dotSelector: '#d{id}_{qi} .dot-inner',
      dotDelay: function(s, qi) {
        return ctx.getStaggerDelay(s.id - 1, series.length, null, svgEl) + qi * (dotTravelSeconds / Math.max(1, xs.length - 1));
      }
    });

    var dotLastDelay = ctx.getStaggerDelay(series.length - 1, series.length, null, svgEl) + dotTravelSeconds;
    var readyDelayMs = Math.max(revealTiming.readyDelayMs, (dotLastDelay + 0.35 + 0.1) * 1000);
    setTimeout(function(){ dataLayerEl.classList.add('ready'); }, readyDelayMs);

    svgEl._onModeChange = function() { syncGradients(); };
    syncGradients();
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
