    @import url('chart-shared.css');
    svg {
      --critical-chart-total: #1C1B1F;
      --critical-category-sub: #79747E;
      --critical-axis: #79747E;
    }
    svg.dark {
      --critical-chart-total: #E6E0E9;
      --critical-category-sub: #938F99;
      --critical-axis: #938F99;
    }
    .category-label { fill:var(--critical-chart-total); }
    .category-sub { font-size:11px; fill:var(--critical-category-sub); font-weight:400; }
    .chart-total { font-size:13px; fill:var(--critical-chart-total); font-weight:600; }
    .axis-line { stroke:var(--critical-axis); stroke-width:1.5; }

    .data-item { opacity:0; }
    .data-item.visible { opacity:1; }
    .structural-overlay         { opacity:0; pointer-events:none; }
    .structural-overlay.visible { opacity:1; }

  </style>
</defs>


