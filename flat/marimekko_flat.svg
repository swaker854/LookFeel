<!--
  Tooltip overlay ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â JS-driven, 3-element pattern (tip-bg + tip-border + tip-tail)
  Anchor follows cursor. Box W=120 H=58 TH=10 RX=8 G=8
-->
<g id="tip-overlay">
  <g class="data-tip" id="tip">
    <rect id="tip-bg"  class="tip-bg"     x="0" y="0" width="0" height="0" rx="8"/>
    <path id="tip-bdr" class="tip-border" d="M0,0"/>
    <path id="tip-tip" class="tip-tail"   d="M0,0"/>
    <text id="tip-val" class="tip-value"  x="0" y="0" text-anchor="middle"/>
    <text id="tip-lbl" class="tip-label"  x="0" y="0" text-anchor="middle"/>
    <text id="tip-pct" class="tip-pct"    x="0" y="0" text-anchor="middle"/>
  </g>
</g>

<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
  var dataLayerEl = ctx.$$('#data-layer');
  var structuralOverlayEl = ctx.$$('#structural-overlay');
  var xAxisLabelsEl = ctx.$$('#x-axis-labels');
  var chartTotalEl = ctx.$$('#chart-total');
  var legendPanelEl = ctx.$$('.legend-panel');
  var cells = ctx.$$all('.data-item');

  ctx.rebalancePlotArea({
    legendEl: legendPanelEl,
    measureNodes: [dataLayerEl, structuralOverlayEl, xAxisLabelsEl],
    moveNodes: [dataLayerEl, structuralOverlayEl, xAxisLabelsEl, chartTotalEl],
    outerLeft: 24,
    legendGap: 32
  });

  var timing = ctx.getStaggerTiming(cells.length, null, svgEl);
  var duration = timing.duration;
  var delays = cells.map(function (_, index) {
    return ctx.getStaggerDelay(index, cells.length, null, svgEl);
  });
  ctx.initRevealSequence(cells, {
    animationName: 'dataFadeIn',
    duration: duration,
    easing: 'ease-out',
    delays: delays
  });
  if (structuralOverlayEl) {
    ctx.animateAndMarkVisible(structuralOverlayEl, 'dataFadeIn ' + duration + 's ease-out 0s');
  }
  setTimeout(function() { dataLayerEl.classList.add('ready'); }, ctx.getRevealReadyDelayMs({ delays: delays, duration: duration, buffer: 0.1 }));

  var BH = 120;
  var tip    = ctx.$$('#tip');
  var tipBg  = ctx.$$('#tip-bg');
  var tipBdr = ctx.$$('#tip-bdr');
  var tipTip = ctx.$$('#tip-tip');
  var tipVal = ctx.$$('#tip-val');
  var tipLbl = ctx.$$('#tip-lbl');
  var tipPct = ctx.$$('#tip-pct');

  function positionTip(mx, my, name, val, pct) {
    var productMatch = /Product\s+[A-Z]/.exec(name || '');
    var country = productMatch ? name.slice(0, productMatch.index) : String(name || '');
    country = country.replace(/[^\w\s]+$/g, '').trim();
    tipVal.textContent = country;
    tipLbl.textContent = productMatch ? productMatch[0] : '';
    tipPct.textContent = 'Value: ' + val + ' - ' + pct + ' of product';

    /* 2 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â measure widest line, derive hw (half-width), minimum 60px total */
    var pad = 20;
    var BW = Math.max(
      tipVal.getBBox().width + pad,
      tipLbl.getBBox().width + pad,
      tipPct.getBBox().width + pad,
      60
    );
    var box = ctx.buildChartTip(mx, my, BW, BH, 8, 1080, 92, 543);

    /* 3 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â clamp tx so bubble stays inside viewBox */
    tipBg.setAttribute('x',      box.bL);

    /* 4 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â flip: show below cursor when near top */
    tipBg.setAttribute('y',      box.bT);

    /* tip-bg rect */
    tipBg.setAttribute('width',  BW);
    tipBg.setAttribute('height', BH);

    /* tip-border open path ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â all absolute, 1px inset at tail root to close seam */
    tipBdr.removeAttribute('transform');
    tipBdr.setAttribute('d', box.borderPath);
    tipTip.setAttribute('d', box.tailPath);

    /* text positions */
    tipVal.setAttribute('x', box.bCx); tipVal.setAttribute('y', box.bT + BH * 0.22);
    tipLbl.setAttribute('x', box.bCx); tipLbl.setAttribute('y', box.bT + BH * 0.52);
    tipPct.setAttribute('x', box.bCx); tipPct.setAttribute('y', box.bT + BH * 0.80);
  }

  function updatePointer(cell, event) {
    var sp = ctx.eventToSvgPoint(svgEl, event);
    cell.__tipPoint = { x: sp.x, y: sp.y };
    if (cell.classList.contains('active')) {
      positionTip(
        sp.x,
        sp.y,
        cell.getAttribute('data-name'),
        cell.getAttribute('data-val'),
        cell.getAttribute('data-pct')
      );
    }
  }

  cells.forEach(function(cell) {
    cell.addEventListener('mouseenter', function(event) { updatePointer(cell, event); });
    cell.addEventListener('mousemove', function(event) { updatePointer(cell, event); });
  });

  ctx.initExclusiveHoverTips(dataLayerEl, cells, {
    leaveTarget: dataLayerEl,
    resolveTip: function () {
      return tip;
    },
    beforeShow: function (cell) {
      var point = cell.__tipPoint;
      var cellBox;
      if (!point) {
        cellBox = cell.getBBox();
        point = { x: cellBox.x + cellBox.width / 2, y: cellBox.y + cellBox.height / 2 };
      }
      positionTip(
        point.x,
        point.y,
        cell.getAttribute('data-name'),
        cell.getAttribute('data-val'),
        cell.getAttribute('data-pct')
      );
    },
    afterHide: function () {
      tipBdr.removeAttribute('transform');
    }
  });

  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
