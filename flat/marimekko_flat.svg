<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
  var dataLayerEl = ctx.$$('#data-layer');
  var structuralOverlayEl = ctx.$$('#structural-overlay');
  var xAxisLabelsEl = ctx.$$('#x-axis-labels');
  var chartTotalEl = ctx.$$('#chart-total');
  var legendRoot = ctx.$$('#legend-root');
  var cells = ctx.$$all('.data-item');

  ctx.initStandardLegend({
    legendEl: legendRoot,
    title: 'COUNTRY',
    items: [
      { cls: 'series-1', label: 'USA', value: '300' },
      { cls: 'series-2', label: 'China', value: '187' },
      { cls: 'series-3', label: 'UK', value: '214' },
      { cls: 'series-4', label: 'Germany', value: '271' },
      { cls: 'series-5', label: 'France', value: '126' },
      { cls: 'series-6', label: 'India', value: '268' }
    ]
  });

  ctx.rebalancePlotArea({
    legendEl: legendRoot,
    measureNodes: [dataLayerEl, structuralOverlayEl, xAxisLabelsEl],
    moveNodes: [dataLayerEl, structuralOverlayEl, xAxisLabelsEl, chartTotalEl],
    outerLeft: 24,
    legendGap: 32
  });

  var timing = ctx.getStaggerTiming(cells.length, null, svgEl);
  var duration = timing.duration;
  var delays = cells.map(function (_, index) {
    return ctx.getStaggerDelay(index, cells.length, null, svgEl);
  });
  ctx.initRevealSequence(cells, {
    animationName: 'dataFadeIn',
    duration: duration,
    easing: 'ease-out',
    delays: delays
  });
  if (structuralOverlayEl) {
    ctx.animateAndMarkVisible(structuralOverlayEl, 'dataFadeIn ' + duration + 's ease-out 0s');
  }
  ctx.markReadyAfterReveal(dataLayerEl, { delays: delays, duration: duration, buffer: 0.1 });
  ctx.initStandardTooltip(dataLayerEl, cells, {
    tip: ctx.$$('#tip'),
    plotL: 8,
    plotR: 1080,
    plotT: 92,
    plotB: 543,
    placement: 'side',
    minWidth: 220,
    paddingX: 20,
    paddingY: 18,
    lineHeights: [42, 32, 32],
    trackPointer: false,
    getContent: function (cell) {
      var name = cell.getAttribute('data-name') || '';
      var productMatch = /Product\s+[A-Z]/.exec(name);
      var country = productMatch ? name.slice(0, productMatch.index) : String(name || '');
      country = country.replace(/[^\\w\\s]+$/g, '').trim();
      return {
        primary: country,
        label: productMatch ? productMatch[0] : '',
        meta: 'Value: ' + (cell.getAttribute('data-val') || '') + ' - ' + (cell.getAttribute('data-pct') || '') + ' of product'
      };
    },
    leaveTarget: dataLayerEl
  });

  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
