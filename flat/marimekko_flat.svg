<!--
  Tooltip overlay - JS-driven, 3-element pattern (tip-bg + tip-border + tip-tail)
  Anchor follows cursor. Box W=120 H=58 TH=10 RX=8 G=8
-->
<g id="tip-overlay">
  <g class="data-tip" id="tip">
    <rect id="tip-bg"  class="tip-bg"     x="0" y="0" width="0" height="0" rx="8"/>
    <path id="tip-bdr" class="tip-border" d="M0,0"/>
    <path id="tip-tip" class="tip-tail"   d="M0,0"/>
    <text id="tip-val" class="tip-value"  x="0" y="0" text-anchor="middle"/>
    <text id="tip-lbl" class="tip-label"  x="0" y="0" text-anchor="middle"/>
    <text id="tip-pct" class="tip-pct"    x="0" y="0" text-anchor="middle"/>
  </g>
