<!-- Shared tooltip shell -->
<g id="tip-layer" pointer-events="none">
  <g class="tip" id="tip">
    <rect id="tip-bg" class="tip-bg" rx="12"/>
    <path id="tip-bdr" class="tip-border"/>
    <path id="tip-tail" class="tip-tail"/>
    <text id="tip-val" text-anchor="middle" dominant-baseline="central" class="tip-value"/>
    <text id="tip-lbl" text-anchor="middle" dominant-baseline="central" class="tip-label"/>
    <text id="tip-pct" text-anchor="middle" dominant-baseline="central" class="tip-pct"/>
  </g>
</g>

<!-- Legend -->
<g id="legend-root"></g>


<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl = svgEl.querySelector('#data-layer');
    var tip = svgEl.querySelector('#tip');
    var legendRoot = svgEl.querySelector('#legend-root');
    var dataItemEls = ctx.$$all('.data-item');
    var dataBodyEls = ctx.$$all('.data-body');
    var paretoLine = svgEl.querySelector('#pareto-line');
    var paretoDots = ctx.$$all('.pareto-dot');
    var barCount = dataItemEls.length;
    var barStagger = Math.min(0.25, 1.0 / Math.max(1, barCount));
    var barDuration = 0.8;
    var lastBarDelay = (barCount - 1) * barStagger;
    var lastBarEnd = (lastBarDelay + barDuration + 0.1) * 1000;

    ctx.initStandardLegend({
      legendEl: legendRoot,
      title: 'SERIES',
      items: [
        { cls: 'series-5', label: 'Violet', value: '$79M' },
        { cls: 'series-1', label: 'Cyan', value: '$72M' },
        { cls: 'series-2', label: 'Emerald', value: '$68M' },
        { cls: 'series-6', label: 'Blue', value: '$64M' },
        { cls: 'series-7', label: 'Teal', value: '$61M' },
        { cls: 'series-3', label: 'Amber', value: '$60M' },
        { cls: 'series-4', label: 'Rose', value: '$55M' },
        { cls: 'series-8', label: 'Other', value: '$48M' }
      ]
    });

    dataBodyEls.forEach(function (bodyEl, index) {
      var delay = ctx.getStaggerDelay(index, dataBodyEls.length, null);
      ctx.animateAndMarkVisible(
        bodyEl,
        'dataFadeIn var(--chart-fade-duration, 0.8s) ease-out ' + delay + 's'
      );
    });

    setTimeout(function () {
      if (paretoLine) ctx.animateAndMarkVisible(paretoLine, 'paretoFade 0.5s ease-out 0s');
      paretoDots.forEach(function (dot, index) {
        ctx.animateAndMarkVisible(
          dot,
          'paretoFade 0.25s ease-out ' + (index * 0.06).toFixed(2) + 's'
        );
      });
    }, lastBarEnd);

    ctx.initStandardTooltip(dataLayerEl, dataItemEls, {
      leaveTarget: dataLayerEl,
      tip: tip,
      meta: svgEl.querySelector('#tip-pct'),
      plotL: 68,
      plotR: 820,
      plotT: 100,
      plotB: 500,
      boxHeight: 120,
      minWidth: 240,
      lineY: [0.22, 0.52, 0.80],
      trackPointer: false,
      getContent: function (itemEl) {
        return {
          primary: itemEl.getAttribute('data-value') || '',
          label: (itemEl.getAttribute('data-label') || '') + ' - ' + (itemEl.getAttribute('data-share') || ''),
          meta: itemEl.getAttribute('data-cum') || ''
        };
      },
      getAnchor: function (itemEl) {
        return {
          x: parseFloat(itemEl.getAttribute('data-cx')),
          y: parseFloat(itemEl.getAttribute('data-top'))
        };
      }
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
