
<svg id="root" class="chart-standard" viewBox="-40 88 1120 455" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto','Helvetica Neue',Arial,sans-serif">
<script type="text/javascript">
  <![CDATA[
  (function () {
    if (window.location.href.indexOf('theme=dark') !== -1) {
      document.documentElement.classList.add('dark');
    }
  }());
  ]]>
</script>
<defs>
  <style>
    @import url('chart-shared.css');

    /* prevent first paint in wrong color before shared css load */
    svg {
      --critical-tick-fill: #79747E;
      --critical-grid-stroke: #E7E0EC;
      --critical-axis-stroke: #79747E;
      --critical-tick-right-fill: #8B5CF6;
      --critical-grid-right-stroke: #C7B8F5;
    }
    svg.dark {
      --critical-tick-fill: #938F99;
      --critical-grid-stroke: #49454F;
      --critical-axis-stroke: #938F99;
      --critical-tick-right-fill: #A78BFA;
      --critical-grid-right-stroke: #4F4A8A;
    }

    .c-pareto { fill:#8B5CF6; stroke:#8B5CF6; }
    .c-pareto-stroke { fill:none; stroke:#8B5CF6; }
    svg.dark .c-pareto { fill:#A78BFA; stroke:#A78BFA; }
    svg.dark .c-pareto-stroke { stroke:#A78BFA; }

    @keyframes paretoFade { from { opacity:0; } to { opacity:1; } }

    .data-body { opacity:0; }
    .data-body.visible { opacity:1; }

    .pareto-line { opacity:0; fill:none; stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round; }
    .pareto-line.visible { opacity:1; transition:none; }
    .pareto-dot { opacity:0; }
    .pareto-dot.visible { opacity:1; transition:none; }
    .p80-line { stroke-width:1.2; stroke-dasharray:5 4; opacity:0.55; }
    .pareto-line, .pareto-dot, .p80-line, .grid-line-right { pointer-events:none; }

  </style>
</defs>

<!-- Left axis -->
<line x1="68" y1="500" x2="820" y2="500" class="axis-line" stroke="var(--critical-axis-stroke)" stroke-width="1.5"/>
<line x1="68" y1="400" x2="820" y2="400" class="grid-line" stroke="var(--critical-grid-stroke)" stroke-width="1"/>
<line x1="68" y1="300" x2="820" y2="300" class="grid-line" stroke="var(--critical-grid-stroke)" stroke-width="1"/>
<line x1="68" y1="200" x2="820" y2="200" class="grid-line" stroke="var(--critical-grid-stroke)" stroke-width="1"/>
