<text x="310" y="522" class="category-label" text-anchor="middle" fill="var(--critical-tick-fill)" font-size="10" font-weight="500">Emerald</text>
<text x="400" y="522" class="category-label" text-anchor="middle" fill="var(--critical-tick-fill)" font-size="10" font-weight="500">Blue</text>
<text x="490" y="522" class="category-label" text-anchor="middle" fill="var(--critical-tick-fill)" font-size="10" font-weight="500">Teal</text>
