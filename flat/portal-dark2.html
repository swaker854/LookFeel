<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Dashboard Portal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
    }

    /* CSS tokens matching chart dark mode */
    :root {
      --bg: #151825;
      --bg-surface: #222840;
      --bg-surface-2: #252B3E;
      --border: rgba(255, 255, 255, 0.12);
      --border-cyan: rgba(0, 242, 255, 0.22);
      --text-primary: #EEF2F7;
      --text-sec: #8A99B0;
      --text-muted: #7A8EA8;
      --text-dim: #3E4E62;
      --accent: #22D3EE;
      --active-bg: rgba(0, 242, 255, 0.08);
      --hover-bg: rgba(255, 255, 255, 0.04);
    }

    .portal {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text-sec);
    }

    /* Top nav — flat, no shadows or glows */
    .topnav {
      display: flex;
      align-items: center;
      height: 44px;
      padding: 0 12px;
      flex-shrink: 0;
      gap: 4px;
      background: var(--bg-surface-2);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .nav-logo svg {
      width: 20px;
      height: 20px;
    }

    .nav-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .nav-btn:hover {
      background: var(--hover-bg);
    }

    .nav-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Active state — flat, border only, no inset shadow or glow */
    .nav-btn.active {
      background: var(--active-bg);
      border: 0.5px solid var(--border-cyan);
    }

    .nav-spacer {
      flex: 1;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-right-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nav-right-btn:hover {
      background: var(--hover-bg);
    }

    .nav-right-btn svg {
      width: 13px;
      height: 13px;
    }

    .nav-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--bg-surface-2);
      border: 0.5px solid var(--border-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .nav-avatar svg {
      width: 14px;
      height: 14px;
      fill: var(--text-sec);
    }

    /* Breadcrumb bar */
    .breadcrumb-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 32px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-sec);
    }

    .breadcrumb-sep {
      color: var(--text-dim);
      font-size: 11px;
    }

    .breadcrumb-spacer {
      flex: 1;
    }

    .breadcrumb-action {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .breadcrumb-action:hover {
      background: var(--hover-bg);
    }

    .breadcrumb-action svg {
      width: 12px;
      height: 12px;
    }

    /* Body */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Left panel */
    .left-panel {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-search-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-search {
      flex: 1;
      font-size: 11px;
      font-family: inherit;
      padding: 4px 8px;
      border-radius: 5px;
      border: 0.5px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-sec);
      outline: none;
      min-width: 0;
    }

    .panel-search::placeholder {
      color: var(--text-muted);
    }

    .panel-search:focus {
      border-color: var(--border-cyan);
    }

    .panel-icon-btn {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .panel-icon-btn:hover {
      background: var(--hover-bg);
    }

    .panel-icon-btn svg {
      width: 11px;
      height: 11px;
    }

    /* Tree */
    .tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .tree::-webkit-scrollbar {
      width: 3px;
    }

    .tree::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .tree-section {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.12s;
    }

    .tree-section:hover {
      background: var(--hover-bg);
      color: var(--text-sec);
    }

    .tree-chevron {
      font-size: 8px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .tree-section svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 3px 24px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }

    .tree-item:hover {
      background: var(--hover-bg);
      color: var(--text-sec);
    }

    .tree-item svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      opacity: 0.4;
    }

    .tree-item.active {
      background: var(--active-bg);
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Flat accent bar — no glow */
    .tree-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
    }

    .tree-item.active svg {
      opacity: 0.9;
    }

    /* Content grid - Fixed row behavior */
    .content {
      flex: 1;
      overflow-y: auto;
      /* Enable vertical scrolling for the grid */
      padding: 12px;
      /* Add a little breathing room */
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: max-content;
      /* Row height matches the card height */
      gap: 12px;
      /* Added a gap to prevent visual touching */
      background: var(--bg);
    }


    .chart-card {
      position: relative;
      border-radius: 12px;
      /* Slightly tighter radius for the portal look */
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1100 / 620;
      /* This defines the height based on width */
      background: var(--bg-surface);
      /* Helps visualize the card bounds */
      border: 1px solid var(--border);
    }

    .chart-frame {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      border-radius: 18px;
      display: block;
    }

    .chart-card-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 0;
      background: var(--bg-surface);
    }

    .chart-card-shell.light {
      background: #f8f5fb;
      border-color: rgba(121, 116, 126, 0.28);
      box-shadow: 0 18px 40px rgba(28, 27, 31, 0.08);
    }

    .chart-shell-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.035);
    }

    .chart-card-shell.light .chart-shell-header {
      border-bottom-color: rgba(121, 116, 126, 0.18);
    }

    .chart-shell-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .chart-shell-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.18;
      color: var(--text-primary);
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-card-shell.light .chart-shell-title {
      color: #1c1b1f;
    }

    .chart-shell-subtitle {
      font-size: 10px;
      line-height: 1.35;
      color: rgba(138, 153, 176, 0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-card-shell.light .chart-shell-subtitle {
      color: #79747e;
    }

    .chart-shell-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .chart-shell-btn {
      min-width: 56px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-sec);
      font: inherit;
      font-size: 9px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .chart-card-shell.light .chart-shell-btn {
      border-color: rgba(121, 116, 126, 0.28);
      background: rgba(121, 116, 126, 0.06);
      color: #49454f;
    }

    .chart-shell-btn:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .chart-card-shell.light .chart-shell-btn:hover {
      background: rgba(121, 116, 126, 0.12);
    }

    .chart-shell-btn.active {
      color: var(--text-primary);
      border-color: var(--border-cyan);
      background: rgba(0, 242, 255, 0.08);
    }

    .chart-card-shell.light .chart-shell-btn.active {
      color: #1c1b1f;
      border-color: rgba(0, 184, 122, 0.42);
      background: rgba(0, 184, 122, 0.12);
    }

    .chart-shell-body {
      min-height: 0;
      padding: 12px 10px 8px;
    }

    .chart-card-shell {
      aspect-ratio: 1100 / 720;
    }

    .chart-card-shell .chart-shell-header {
      padding: 14px 16px 8px;
    }

    .chart-card-shell .chart-shell-title {
      font-size: 14px;
    }

    .chart-card-shell .chart-shell-subtitle {
      font-size: 10px;
    }

    .chart-card-shell .chart-shell-body {
      padding: 6px 22px 2px;
      min-height: 132px;
    }

    .chart-card-shell .chart-frame {
      width: 100%;
      margin-left: 0;
    }

    .chart-card-shell .chart-shell-footer {
      padding: 8px 16px 12px;
      font-size: 9px;
      line-height: 1.35;
    }

    .chart-card-shell.light .chart-shell-body {
      background: linear-gradient(180deg, rgba(255, 251, 254, 0.96), rgba(245, 240, 248, 0.94));
    }

    .chart-card-shell .chart-frame {
      border-radius: 0;
      height: 100%;
    }

    .chart-shell-footer {
      padding: 12px 20px 16px;
      font-size: 10px;
      line-height: 1.5;
      letter-spacing: 0.15px;
      color: rgba(138, 153, 176, 0.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-card-shell.light .chart-shell-footer {
      color: #79747e;
    }
  </style>
</head>

  <script>
    var defaultPalette = ['#00D4E8', '#00B87A', '#F59E0B', '#F43F5E', '#8B5CF6', '#3B82F6', '#0D9488', '#64748B'];
    var chartShellMeta = {
      'treemap_flat.svg': {
        title: 'Revenue by Category - Treemap',
        subtitle: '8 segments · area proportional to revenue · hover to inspect',
        footer: 'Revenue by category · treemap · hover to inspect · print mode reveals values'
      },
      'marimekko_flat.svg': {
        title: 'Sales by Product - Marimekko',
        subtitle: 'Width = product share · height = country mix',
        footer: 'Sales by product and country · marimekko chart · hover to inspect'
      },
      'pareto_flat.svg': {
        title: 'Defects by Category - Pareto',
        subtitle: 'Bars sorted descending with cumulative line · hover to inspect',
        footer: 'Defects by category · pareto chart · print mode reveals values'
      },
      'radar_flat.svg': {
        title: 'Capability Comparison - Radar',
        subtitle: 'Five profiles across shared dimensions · hover to inspect',
        footer: 'Capability comparison · radar chart · hover to inspect'
      },
      'waterfall_flat.svg': {
        title: 'Revenue Bridge - Waterfall',
        subtitle: 'Step contributions from baseline to final total · hover to inspect',
        footer: 'Revenue bridge · waterfall chart · hover to inspect'
      },
      'sunburst_flat.svg': {
        title: 'Revenue by Category - Sunburst',
        subtitle: 'Inner ring = category · outer ring = quarter',
        footer: 'Revenue sunburst · hover to inspect · print mode reveals values'
      },
      'boxplot_flat.svg': {
        title: 'Distribution by Segment - Box Plot',
        subtitle: 'Quartiles, whiskers, and outliers by group · hover to inspect',
        footer: 'Distribution by segment · box plot · hover to inspect'
      },
      'gantt_flat.svg': {
        title: 'Project Timeline - Gantt',
        subtitle: 'Tasks, milestones, and dependencies across the schedule',
        footer: 'Project timeline · gantt chart · hover to inspect'
      },
      'icicle_flat.svg': {
        title: 'Flare Visualization Toolkit - Icicle',
        subtitle: 'Five levels · area proportional to source lines of code',
        footer: 'Flare visualization toolkit · icicle chart · hover to inspect'
      }
    };

    function shellMarkup(title, subtitle, footer, src) {
      return '' +
        '<div class="chart-shell-header">' +
          '<div class="chart-shell-copy">' +
            '<div class="chart-shell-title">' + title + '</div>' +
            '<div class="chart-shell-subtitle">' + subtitle + '</div>' +
          '</div>' +
          '<div class="chart-shell-controls">' +
            '<button class="chart-shell-btn" type="button" data-chart-open>Open</button>' +
            '<button class="chart-shell-btn active" type="button" data-chart-mode>Light</button>' +
            '<button class="chart-shell-btn" type="button" data-chart-print>Print</button>' +
          '</div>' +
        '</div>' +
        '<div class="chart-shell-body">' +
          '<iframe class="chart-frame" src="' + src + '" scrolling="no" frameborder="0" data-chart-frame></iframe>' +
        '</div>' +
        '<div class="chart-shell-footer">' + footer + '</div>';
    }

    document.querySelectorAll('.chart-card').forEach(function (card) {
      var existingFrame = card.querySelector('iframe.chart-frame');
      if (!existingFrame) return;

      var src = existingFrame.getAttribute('src') || '';
      var base = src.split('?')[0];
      var meta = chartShellMeta[base];
      if (!meta) return;

      if (!card.hasAttribute('data-chart-shell')) {
        card.classList.add('chart-card-shell');
        card.setAttribute('data-chart-shell', '');
        card.innerHTML = shellMarkup(meta.title, meta.subtitle, meta.footer, src);
      }
    });

    document.querySelectorAll('[data-chart-shell]').forEach(function (card) {
      card.dataset.dark = 'true';
      card.dataset.print = 'false';
      var frame = card.querySelector('[data-chart-frame], iframe.chart-frame');
      if (frame) {
        frame.addEventListener('load', function () {
          syncChartCard(card);
        });
      }
      paintChartCard(card);
    });

    function paintChartCard(card) {
      var modeBtn = card.querySelector('[data-chart-mode]');
      var printBtn = card.querySelector('[data-chart-print]');
      var dark = card.dataset.dark !== 'false';
      var print = card.dataset.print === 'true';
      card.classList.toggle('light', !dark);
      if (modeBtn) {
        modeBtn.classList.toggle('active', dark);
        modeBtn.textContent = dark ? 'Light' : 'Dark';
      }
      if (printBtn) {
        printBtn.classList.toggle('active', print);
        printBtn.textContent = print ? 'Screen' : 'Print';
      }
    }

    function syncChartCard(card) {
      var frame = card.querySelector('[data-chart-frame], iframe.chart-frame');
      if (!frame || !frame.contentWindow) return;
      var dark = card.dataset.dark !== 'false';
      var print = card.dataset.print === 'true';
      var currentSrc = frame.getAttribute('src') || '';
      var desiredSrc = setFrameTheme(currentSrc, dark);
      if (desiredSrc && desiredSrc !== currentSrc) {
        frame.setAttribute('src', desiredSrc);
        return;
      }
      frame.contentWindow.postMessage({ type: 'setMode', dark: dark }, '*');
      frame.contentWindow.postMessage({ type: 'setPrint', print: print }, '*');
    }

    function setFrameTheme(src, dark) {
      if (!src) return src;
      var parts = src.split('#');
      var hash = parts[1] ? '#' + parts[1] : '';
      var queryParts = parts[0].split('?');
      var base = queryParts[0];
      var query = queryParts[1] || '';
      var params = query ? query.split('&').filter(Boolean) : [];
      var filtered = params.filter(function (part) { return part.split('=')[0] !== 'theme'; });
      filtered.push('theme=' + (dark ? 'dark' : 'light'));
      return base + '?' + filtered.join('&') + hash;
    }

    document.addEventListener('click', function (event) {
      var openBtn = event.target.closest('[data-chart-open]');
      if (openBtn) {
        var openCard = openBtn.closest('[data-chart-shell]');
        if (!openCard) return;
        var targetFrame = openCard.querySelector('[data-chart-frame], iframe.chart-frame');
        if (!targetFrame) return;
        var targetSrc = targetFrame.getAttribute('src');
        if (targetSrc) window.open(targetSrc, '_blank', 'noopener');
        return;
      }

      var modeBtn = event.target.closest('[data-chart-mode]');
      if (modeBtn) {
        var modeCard = modeBtn.closest('[data-chart-shell]');
        if (!modeCard) return;
        modeCard.dataset.dark = modeCard.dataset.dark === 'false' ? 'true' : 'false';
        paintChartCard(modeCard);
        syncChartCard(modeCard);
        return;
      }

      var printBtn = event.target.closest('[data-chart-print]');
      if (printBtn) {
        var printCard = printBtn.closest('[data-chart-shell]');
        if (!printCard) return;
        printCard.dataset.print = printCard.dataset.print === 'true' ? 'false' : 'true';
        paintChartCard(printCard);
        syncChartCard(printCard);
      }
    });
  </script>
