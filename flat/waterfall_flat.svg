<svg id="root" class="chart-standard" viewBox="-40 88 1120 455" width="100%" height="100%"
  preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
  font-family="'Roboto','Helvetica Neue',Arial,sans-serif">
  <script type="text/javascript">
    <![CDATA[
    (function () {
      if (window.location.href.indexOf('theme=dark') !== -1) {
       document.documentElement.classList.add('dark');
      }
    }());
    ]]>
  </script>

  <defs>
    <style>
      @import url('chart-shared.css');
      svg {
      --critical-tick-fill: #79747E;
      --critical-grid-stroke: #E7E0EC;
      --critical-axis-stroke: #79747E;
      --critical-connector-stroke: #B0A8B9;
      }
      svg.dark {
      --critical-tick-fill: #938F99;
      --critical-grid-stroke: #49454F;
      --critical-axis-stroke: #938F99;
      --critical-connector-stroke: #49454F;
      }
      .tick-label, .category-label { fill: var(--critical-tick-fill); }
      .grid-line { stroke: var(--critical-grid-stroke); }
      .axis-line { stroke: var(--critical-axis-stroke); }
      .conn { stroke: var(--critical-connector-stroke); stroke-width:1; stroke-dasharray:4 3; }
      .series-total { fill: var(--series-6); }
      .data-body { opacity:0; }
      .data-body.visible { opacity:1; }
    </style>
  </defs>

  <line x1="68" y1="500" x2="820" y2="500" class="axis-line" />
  <line x1="68" y1="420" x2="820" y2="420" class="grid-line" />
  <line x1="68" y1="340" x2="820" y2="340" class="grid-line" />
  <line x1="68" y1="260" x2="820" y2="260" class="grid-line" />
  <line x1="68" y1="180" x2="820" y2="180" class="grid-line" />
  <line x1="68" y1="100" x2="820" y2="100" class="grid-line" />
  <line x1="68" y1="100" x2="68" y2="500" class="axis-line" />

  <text x="56" y="504" class="tick-label" text-anchor="end">$0</text>
  <text x="56" y="424" class="tick-label" text-anchor="end">$100M</text>
  <text x="56" y="344" class="tick-label" text-anchor="end">$200M</text>
  <text x="56" y="264" class="tick-label" text-anchor="end">$300M</text>
  <text x="56" y="184" class="tick-label" text-anchor="end">$400M</text>
  <text x="56" y="104" class="tick-label" text-anchor="end">$500M</text>

  <text x="96" y="522" class="category-label" text-anchor="middle">Cyan</text>
  <text x="180" y="522" class="category-label" text-anchor="middle">Emerald</text>
  <text x="264" y="522" class="category-label" text-anchor="middle">Amber</text>
  <text x="348" y="522" class="category-label" text-anchor="middle">Rose</text>
  <text x="432" y="522" class="category-label" text-anchor="middle">Violet</text>
  <text x="516" y="522" class="category-label" text-anchor="middle">Blue</text>
  <text x="600" y="522" class="category-label" text-anchor="middle">Teal</text>
  <text x="684" y="522" class="category-label" text-anchor="middle">Other</text>
  <text x="768" y="522" class="category-label" text-anchor="middle">Total</text>

  <line class="conn" x1="124" y1="442" x2="152" y2="442" />
  <line class="conn" x1="208" y1="388" x2="236" y2="388" />
  <line class="conn" x1="292" y1="340" x2="320" y2="340" />
  <line class="conn" x1="376" y1="296" x2="404" y2="296" />
  <line class="conn" x1="460" y1="233" x2="488" y2="233" />
  <line class="conn" x1="544" y1="182" x2="572" y2="182" />
  <line class="conn" x1="628" y1="133" x2="656" y2="133" />
  <line class="conn" x1="712" y1="100" x2="740" y2="100" />

  <g class="data-layer" id="data-layer">
    <g class="data-item" id="data-item-1" data-item-cx="96" data-item-top="442.4" data-label="Cyan" data-value="+$72M">
      <g class="data-body">
        <rect x="68" y="442.4" width="56" height="57.6" rx="10" class="series-1" />
      </g>
    </g>

    <g class="data-item" id="data-item-2" data-item-cx="180" data-item-top="388" data-label="Emerald" data-value="+$68M">
      <g class="data-body">
        <rect x="152" y="388" width="56" height="54.4" rx="10" class="series-2" />
      </g>
    </g>

    <g class="data-item" id="data-item-3" data-item-cx="264" data-item-top="340" data-label="Amber" data-value="+$60M">
      <g class="data-body">
        <rect x="236" y="340" width="56" height="48" rx="10" class="series-3" />
      </g>
    </g>

    <g class="data-item" id="data-item-4" data-item-cx="348" data-item-top="296" data-label="Rose" data-value="+$55M">
      <g class="data-body">
        <rect x="320" y="296" width="56" height="44" rx="10" class="series-4" />
      </g>
    </g>

    <g class="data-item" id="data-item-5" data-item-cx="432" data-item-top="232.8" data-label="Violet" data-value="+$79M">
      <g class="data-body">
        <rect x="404" y="232.8" width="56" height="63.2" rx="10" class="series-5" />
      </g>
    </g>

    <g class="data-item" id="data-item-6" data-item-cx="516" data-item-top="181.6" data-label="Blue" data-value="+$64M">
      <g class="data-body">
        <rect x="488" y="181.6" width="56" height="51.2" rx="10" class="series-6" />
      </g>
    </g>

    <g class="data-item" id="data-item-7" data-item-cx="600" data-item-top="132.8" data-label="Teal" data-value="+$61M">
      <g class="data-body">
        <rect x="572" y="132.8" width="56" height="48.8" rx="10" class="series-7" />
      </g>
    </g>

    <g class="data-item" id="data-item-8" data-item-cx="684" data-item-top="94.4" data-label="Other" data-value="+$48M">
      <g class="data-body">
        <rect x="656" y="94.4" width="56" height="38.4" rx="10" class="series-8" />
      </g>
    </g>

    <g class="data-item" id="data-item-9" data-item-cx="768" data-item-top="94.4" data-label="Total" data-value="$507M">
      <g class="data-body">
        <rect x="740" y="94.4" width="56" height="405.6" rx="10" class="series-total" />
      </g>
    </g>
  </g>

  <g id="tip-layer" pointer-events="none">
    <g class="tip" id="tip">
      <rect id="tip-bg" class="tip-bg" rx="12" />
      <path id="tip-bdr" class="tip-border" />
      <path id="tip-tail" class="tip-tail" />
      <text id="tip-val" class="tip-value" text-anchor="middle" dominant-baseline="central" />
      <text id="tip-lbl" class="tip-label" text-anchor="middle" dominant-baseline="central" />
      <text id="tip-meta" class="tip-pct" text-anchor="middle" dominant-baseline="central" />
    </g>
  </g>

  <g id="legend-root"></g>

  <script href="chart-shared.js"></script>
  <script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl = svgEl.querySelector('.data-layer');
    var tip = svgEl.querySelector('#tip');
    var legendRoot = svgEl.querySelector('#legend-root');
    var dataBodyEls = ctx.$$all('.data-body');

    ctx.initStandardLegend({
      legendEl: legendRoot,
      title: 'SERIES',
      items: [
        { cls: 'series-1', label: 'Cyan', value: '+$72M' },
        { cls: 'series-2', label: 'Emerald', value: '+$68M' },
        { cls: 'series-3', label: 'Amber', value: '+$60M' },
        { cls: 'series-4', label: 'Rose', value: '+$55M' },
        { cls: 'series-5', label: 'Violet', value: '+$79M' },
        { cls: 'series-6', label: 'Blue', value: '+$64M' },
        { cls: 'series-7', label: 'Teal', value: '+$61M' },
        { cls: 'series-8', label: 'Other', value: '+$48M' }
      ]
    });

    dataBodyEls.forEach(function (dataBody, index) {
      var delay = ctx.getStaggerDelay(index, dataBodyEls.length, null, svgEl);
      ctx.animateAndMarkVisible(
        dataBody,
        'dataFadeIn var(--chart-fade-duration, 0.8s) ease-out ' + delay + 's'
      );
    });

    var dataItemEls = ctx.$$all('.data-item');
    ctx.initStandardTooltip(dataLayerEl, dataItemEls, {
      leaveTarget: dataLayerEl,
      tip: tip,
      plotL: 68,
      plotR: 820,
      plotT: 100,
      plotB: 500,
      boxHeight: 116,
      minWidth: 220,
      lineY: [0.34, 0.66, 0.86],
      trackPointer: false,
      getContent: function (itemEl) {
        return {
          primary: itemEl.getAttribute('data-value') || '',
          label: itemEl.getAttribute('data-label') || '',
          meta: ''
        };
      },
      getAnchor: function (itemEl) {
        return {
          x: parseFloat(itemEl.getAttribute('data-item-cx')),
          y: parseFloat(itemEl.getAttribute('data-item-top'))
        };
      }
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
