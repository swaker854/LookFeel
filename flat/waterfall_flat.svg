<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
var svg   = document.getElementById('root');
  var dataLayerEl = document.getElementById('data-layer');
  var dataItemEls = dataLayerEl.querySelectorAll('.data-item');

  /* §2 — isDark boolean guard; no swapColors(); dark mode is purely CSS */




  /* §4 — Hover: JS class toggling, no :hover pseudo-class */
  dataItemEls.forEach(function(itemEl) {
    itemEl.addEventListener('mouseenter', function() {
      /* stale-clear first, then add hovering + active atomically */
      dataItemEls.forEach(function(x) { x.classList.remove('active'); });
      dataLayerEl.classList.add('hovering');
      itemEl.classList.add('active');
    });
    itemEl.addEventListener('mouseleave', function() {
      dataLayerEl.classList.remove('hovering');
      itemEl.classList.remove('active');
    });
  });


  /* §2 — Initialise: light mode (isDark=false is already the default) */
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
