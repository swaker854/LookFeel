

<svg id="root" class="chart-standard" viewBox="40 80 1040 463" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto','Helvetica Neue',Arial,sans-serif">
<defs>
  <style>
    @import url('chart-shared.css');
  .chart-shell-hidden { display:none; }
  .card-bg, .border-light, .border-dark { display:none; }

    /* Ãƒâ€šÃ‚Â§1 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Standard palette (CSS single source of truth, no fill attrs on bars) */
    .series-1 { fill:#00D4E8; } .series-2 { fill:#00B87A; }
    .series-3 { fill:#F59E0B; } .series-4 { fill:#F43F5E; }
    .series-5 { fill:#8B5CF6; } .series-6 { fill:#3B82F6; }
    .series-7 { fill:#0D9488; } .series-8 { fill:#64748B; }
    svg.dark .series-1 { fill:#22D3EE; } svg.dark .series-2 { fill:#10B981; }
    svg.dark .series-3 { fill:#FBB724; } svg.dark .series-4 { fill:#FB6181; }
    svg.dark .series-5 { fill:#A78BFA; } svg.dark .series-6 { fill:#60A5FA; }
    svg.dark .series-7 { fill:#2DD4BF; } svg.dark .series-8 { fill:#94A3B8; }
    /* Total bar uses semantic class aligned to series-6 (blue ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â summary/neutral) */
    .series-total { fill:#3B82F6; }
    svg.dark .series-total { fill:#60A5FA; }

    .card-bg   { fill:#FFFBFE; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.10)); }
    .card-title        { font-size:18px; font-weight:500; fill:#1C1B1F; letter-spacing:-0.2px; }
    .card-subtitle        { font-size:11px; fill:#79747E; font-weight:400; }
    .tick-label        { font-size:10px; fill:#79747E; font-weight:400; }
    .category-label        { font-size:10px; fill:#79747E; font-weight:500; }
    .grid-line        { stroke:#E7E0EC; stroke-width:1; }
    .axis-line        { stroke:#79747E; stroke-width:1.5; }
    .footer    { font-size:10px; fill:#79747E; font-weight:400; }
    .toggle-wrap    { cursor:pointer; }
    .toggle-track   { fill:#E7E0EC; }
    .toggle-thumb   { fill:#ffffff; }
    .toggle-label   { font-size:11px; font-weight:500; fill:#49454F; }
    .print-track  { fill:#E7E0EC; transition:fill 0.3s; }
    .print-thumb  { fill:#ffffff; }
    .print-label  { font-size:11px; font-weight:500; fill:#49454F; }

    svg.print .print-track { fill:#d97316; }

    /* Ãƒâ€šÃ‚Â§3 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Method A2: CSS @keyframes, no SMIL.
       Stagger: min(0.25, 1.0/9) = 0.111s (adaptive formula, 9 bars). */
    @keyframes dataFadeIn { from { opacity:0; } to { opacity:1; } }
    .data-body { animation: dataFadeIn 0.8s ease-out both; }
    .stagger-1 { animation-delay:0.000s; }
    .stagger-2 { animation-delay:0.111s; }
    .stagger-3 { animation-delay:0.222s; }
    .stagger-4 { animation-delay:0.333s; }
    .stagger-5 { animation-delay:0.444s; }
    .stagger-6 { animation-delay:0.556s; }
    .stagger-7 { animation-delay:0.667s; }
    .stagger-8 { animation-delay:0.778s; }
    .stagger-9 { animation-delay:0.889s; }

    /* Ãƒâ€šÃ‚Â§4 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Hover: JS .hovering/.active classes, no :hover pseudo, opacity 0.20 */
    .data-item        { cursor:pointer; }
    .data-tip    { opacity:0; pointer-events:none; transition:opacity 0.15s ease; }
    .data-item.active .data-tip { opacity:1; }
    .data-layer.hovering .data-item         { opacity:0.20; transition:opacity 0.2s ease; }
    .data-layer.hovering .data-item.active  { opacity:1; }
    svg.print .data-tip        { opacity:0 !important; }

    .conn      { stroke:#B0A8B9; stroke-width:1; stroke-dasharray:4 3; }
    svg.dark .conn { stroke:#49454F; }

    /* Ãƒâ€šÃ‚Â§4 ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Tooltip: .tip-border and .tip-tail must never be fill:none */
    .tip-bg    { fill:#FFFBFE; }
    .tip-border   { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .tip-tail   { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .tip-value   { fill:#1C1B1F; font-size:28px; font-weight:700; }
    .tip-label   { fill:#49454F; font-size:22px; font-weight:400; }
    svg.dark .tip-value { fill:#E6E0E9; }
    svg.dark .tip-label { fill:#CAC4D0; }

    svg.dark .card-bg   { fill:#1C1B1F; filter:drop-shadow(0 1px 4px rgba(0,0,0,0.25)); }
    svg.dark .card-title        { fill:#E6E0E9; }
    svg.dark .card-subtitle        { fill:#938F99; }
    svg.dark .tick-label        { fill:#938F99; }
    svg.dark .category-label        { fill:#938F99; }
    svg.dark .grid-line        { stroke:#49454F; }
    svg.dark .axis-line        { stroke:#938F99; }
    svg.dark .footer    { fill:#938F99; }
    svg.dark .toggle-track   { fill:#49454F; }
    svg.dark .toggle-label   { fill:#CAC4D0; }
    svg.dark .print-track  { fill:#49454F; }
    svg.dark .print-label  { fill:#CAC4D0; }
    svg.dark.print .print-track { fill:#d97316; }
    svg.dark .tip-bg    { fill:#1C1B1F; }
    svg.dark .tip-border   { fill:#1C1B1F; stroke:#938F99; stroke-width:1; }
    svg.dark .tip-tail   { fill:#1C1B1F; stroke:#938F99; stroke-width:1; }
    svg.dark .tip-value   { fill:#E6E0E9; }
    svg.dark .tip-label   { fill:#CAC4D0; }

    .border-dark      { display:none; }
    .border-light     { display:block; }
    svg.dark .border-dark  { display:block; }
    svg.dark .border-light { display:none; }
    .card-bg, .border-light, .border-dark, .card-title, .card-subtitle, .footer, .toggle-wrap { display:none !important; }
  </style>
</defs>

