<!-- ‚‚ LEGEND ‚‚ -->
<g id="legend-root"></g>


<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl = svgEl.querySelector('#data-layer');
    var hitLayerEl = svgEl.querySelector('#dot-hit-layer');
    var tipEl = svgEl.querySelector('#tip');
    var legendRoot = svgEl.querySelector('#legend-root');
    var animEls = [
      svgEl.querySelector('#series-anim-3'),
      svgEl.querySelector('#series-anim-2'),
      svgEl.querySelector('#series-anim-1')
    ].filter(Boolean);
    var animDuration = 0.8;
    var lastDelay = animEls.length ? ctx.getStaggerDelay(animEls.length - 1, animEls.length, null) : 0;
    var readyDelay = (lastDelay + animDuration + 0.1) * 1000;

    ctx.initStandardLegend({
      legendEl: legendRoot,
      title: 'SERIES',
      items: [
        { cls: 'series-1', label: 'Cyan', value: 'A' },
        { cls: 'series-5', label: 'Violet', value: 'B' },
        { cls: 'series-2', label: 'Emerald', value: 'C' }
      ]
    });

    animEls.forEach(function (el, index) {
      el.style.opacity = '0';
      el.style.transform = 'scale(0)';

      setTimeout(function () {
        var start = null;
        var durationMs = animDuration * 1000;

        function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
        function step(ts) {
          if (!start) start = ts;
          var progress = Math.min((ts - start) / durationMs, 1);
          var eased = easeOut(progress);
          el.style.opacity = eased;
          el.style.transform = 'scale(' + eased + ')';
          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            el.style.opacity = '';
            el.style.transform = '';
          }
        }

        requestAnimationFrame(step);
      }, ctx.getStaggerDelay(index, animEls.length, null) * 1000);
    });

    setTimeout(function () {
      dataLayerEl.classList.add('ready');
    }, readyDelay);

    var dataItemEls = ctx.$$all('#data-layer .data-item');
    dataItemEls.forEach(function (itemEl) {
      itemEl.addEventListener('mouseenter', function () {
        dataItemEls.forEach(function (el) { el.classList.remove('active'); });
        dataLayerEl.classList.add('hovering');
        itemEl.classList.add('active');
      });
    });
    dataLayerEl.addEventListener('mouseleave', function () {
      dataItemEls.forEach(function (el) { el.classList.remove('active'); });
      dataLayerEl.classList.remove('hovering');
    });

    var hitEls = ctx.$$all('#dot-hit-layer .dht');
    var seriesOrder = ['Cyan', 'Violet', 'Emerald'];
    var axisSummaryByName = {};

    hitEls.forEach(function (hitEl) {
      var axisName = hitEl.getAttribute('data-axis') || '';
      var seriesName = hitEl.getAttribute('data-series') || '';
      var value = hitEl.getAttribute('data-value') || '';
      if (!axisSummaryByName[axisName]) {
        axisSummaryByName[axisName] = {};
      }
      axisSummaryByName[axisName][seriesName] = value;
    });

    ctx.initStandardTooltip(hitLayerEl, hitEls, {
      leaveTarget: hitLayerEl,
      tip: tipEl,
      meta: svgEl.querySelector('#tip-pct'),
      plotL: 68,
      plotR: 820,
      plotT: 100,
      plotB: 500,
      boxHeight: 120,
      minWidth: 320,
      lineY: [0.22, 0.52, 0.80],
      trackPointer: false,
      getContent: function (itemEl) {
        var axisName = itemEl.getAttribute('data-axis') || '';
        var summary = axisSummaryByName[axisName] || {};
        var orderedValues = seriesOrder
          .filter(function (seriesName) { return summary[seriesName] != null && summary[seriesName] !== ''; })
          .map(function (seriesName) { return seriesName + ' ' + summary[seriesName]; });
        return {
          primary: axisName,
          label: orderedValues.join(' · '),
          meta: ''
        };
      },
      getAnchor: function (itemEl) {
        return {
          x: parseFloat(itemEl.getAttribute('cx')),
          y: parseFloat(itemEl.getAttribute('cy'))
        };
      }
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
