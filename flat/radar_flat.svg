<defs>
  <style>
    @import url('chart-shared.css');
    svg {
      --critical-tick-fill: #79747E;
      --critical-category-fill: #1C1B1F;
      --critical-grid-stroke: #E7E0EC;
      --critical-axis-stroke: #79747E;
      --critical-rl-stroke: #C4BECE;
      --critical-spk-stroke: #79747E;
      --critical-sp-poly-1-stroke: #00D4E8;
      --critical-sp-poly-2-stroke: #00B87A;
      --critical-sp-poly-5-stroke: #8B5CF6;
    }
    svg.dark {
      --critical-tick-fill: #938F99;
      --critical-category-fill: #E6E0E9;
      --critical-grid-stroke: #49454F;
      --critical-axis-stroke: #938F99;
      --critical-rl-stroke: #6B6572;
      --critical-spk-stroke: #938F99;
      --critical-sp-poly-1-stroke: #22D3EE;
      --critical-sp-poly-2-stroke: #10B981;
      --critical-sp-poly-5-stroke: #A78BFA;
    }
    .rl { stroke:#C4BECE; stroke-width:0.75; fill:none; }
    .spk { stroke:#79747E; stroke-width:1; opacity:0.25; fill:none; }
    .sp-poly { fill-opacity:0.18; stroke-width:2; stroke-linejoin:round; }
    .sp-poly-1 { stroke:#00D4E8; }
    .sp-poly-2 { stroke:#00B87A; }
    .sp-poly-5 { stroke:#8B5CF6; }
    .sa {
      transform-box: fill-box;
      transform-origin: center;
    }
    .data-layer.ready.hovering .data-item { opacity:0.20; transition:opacity 0.2s ease; }
    .data-layer.ready.hovering .data-item.active { opacity:1; transition:opacity 0.2s ease; }
    .dht { fill:transparent; cursor:pointer; pointer-events:all; }

    svg.dark .rl { stroke:#6B6572; }
    svg.dark .spk { stroke:#938F99; }
    svg.dark .sp-poly-1 { stroke:#22D3EE; }
    svg.dark .sp-poly-2 { stroke:#10B981; }
    svg.dark .sp-poly-5 { stroke:#A78BFA; }
  </style>
</defs>



