<!-- ‚‚ Dot hit-target layer ‚ painted last, above all polygons and bubbles ‚‚
     Invisible r=12 circles guarantee pointer events reach every dot regardless
     of which series polygon is rendered on top. Order: back-to-front so that
     when dots from different series are stacked, the frontmost series (Cyan)
     wins the hit, matching visual expectation. -->
<g id="dot-hit-layer">
  <!-- Emerald hits (back) -->
