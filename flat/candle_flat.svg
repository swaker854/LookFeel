<svg id="root" viewBox="0 0 1100 620" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',Arial,sans-serif">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    .bg-main  { fill:#FFFBFE; }
    .ct       { font-size:18px; font-weight:500; fill:#1C1B1F; letter-spacing:-0.2px; }
    .cs       { font-size:11px; fill:#79747E; }
    .an       { font-size:10px; fill:#79747E; }
    .al       { font-size:10px; fill:#79747E; font-weight:500; }
    .lt       { font-size:11px; fill:#1C1B1F; }
    .lv       { font-size:11px; fill:#1C1B1F; font-weight:500; }
    .gl       { stroke:#E7E0EC; stroke-width:1; fill:none; }
    .bl       { stroke:#79747E; stroke-width:1.5; fill:none; }
    .lgd-bg   { fill:#E7E0EC; stroke:#79747E; stroke-width:0.5; }
    .lgd-div  { stroke:#79747E; stroke-width:0.5; opacity:0.3; }
    .lgd-ttl  { font-size:10px; fill:#79747E; font-weight:500; }
    .footer   { font-size:10px; fill:#79747E; }
    .t-wrap   { cursor:pointer; }
    .t-track  { fill:#E7E0EC; }
    .t-thumb  { fill:#ffffff; }
    .t-label  { font-size:11px; font-weight:500; fill:#49454F; }
    .pt-track { fill:#E7E0EC; transition:fill 0.3s; }

    /* Candles: start invisible + desaturated, bloom into full color */
    .cw {
      opacity: 0;
      filter: saturate(0) brightness(1.8);
      transition: opacity 0.7s ease, filter 0.9s ease;
      cursor: pointer;
    }
    .cw.visible {
      opacity: 1;
      filter: saturate(1) brightness(1);
    }

    /* Dimming: when parent has .dimming, all candles go to 0.15 */
    .ca.dimming .cw {
      opacity: 0.15 !important;
      transition: opacity 0.25s ease;
    }
    /* Hovered candle stays full opacity */
    .ca.dimming .cw.hovered {
      opacity: 1 !important;
      transition: opacity 0.25s ease;
    }

    .c-bull   { fill:#00B87A; }
    .c-bear   { fill:#F43F5E; }
    .w-bull   { stroke:#00B87A; stroke-width:1.5; fill:none; }
    .w-bear   { stroke:#F43F5E; stroke-width:1.5; fill:none; }

    .bubble   { opacity:0; pointer-events:none; transition:opacity 0.15s ease; }
    .bub-fill { fill:#FFFBFE; stroke:#79747E; stroke-width:1; }
    .bub-lbl  { fill:#49454F; font-size:10px; text-anchor:middle; }
    .bub-bull { fill:#008F5D; font-weight:600; }
    .bub-bear { fill:#D9304F; font-weight:600; }
    .bub-neu  { fill:#1C1B1F; font-weight:600; }

    .lgd-val { opacity:0; transition:opacity 0.3s; }
    svg.print .lgd-val  { opacity:1; }
    svg.print .pt-track { fill:#d97316; }

    svg.dark .bg-main   { fill:#1C1B1F; }
    svg.dark .ct        { fill:#E6E0E9; }
    svg.dark .an, svg.dark .al, svg.dark .cs { fill:#938F99; }
    svg.dark .lt, svg.dark .lv { fill:#E6E0E9; }
    svg.dark .gl        { stroke:#49454F; }
    svg.dark .lgd-bg    { fill:#49454F; stroke:#938F99; }
    svg.dark .bub-fill  { fill:#2C2B30; stroke:#938F99; }
    svg.dark .bub-lbl   { fill:#CAC4D0; }
    svg.dark .bub-bull  { fill:#10B981; }
    svg.dark .bub-bear  { fill:#FB6181; }
    svg.dark .bub-neu   { fill:#E6E0E9; }
    svg.dark .t-track, svg.dark .pt-track { fill:#49454F; }
    svg.dark .t-label   { fill:#CAC4D0; }
    svg.dark .lgd-ttl   { fill:#938F99; }
    svg.dark .footer    { fill:#938F99; }

    .border-dark  { display:none; }
    .border-light { display:block; }
    svg.dark .border-dark  { display:block; }
    svg.dark .border-light { display:none; }
  </style>
</defs>

