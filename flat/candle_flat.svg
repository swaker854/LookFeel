


<svg id="root" class="chart-standard" viewBox="-40 88 1120 455" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto',Arial,sans-serif">
  <script type="text/javascript">
    <![CDATA[
    (function () {
      if (window.location.href.indexOf('theme=dark') !== -1) {
       document.documentElement.classList.add('dark');
      }
    }());
    ]]>
  </script>
<defs>
  <style>
    @import url('chart-shared.css');
    /* prevent first paint in wrong color before shared css load */
    svg {
    --critical-tick-fill: #79747E;
    --critical-grid-stroke: #E7E0EC;
    --critical-axis-stroke: #79747E;
    }
    svg.dark {
    --critical-tick-fill: #938F99;
    --critical-grid-stroke: #3A3940;
    --critical-axis-stroke: #938F99;
    }
    .tick-label, .category-label { fill: var(--critical-tick-fill); }
    .grid-line { stroke: var(--critical-grid-stroke); }
    .axis-line { stroke: var(--critical-axis-stroke); }

    .c-bull { fill:var(--series-2); }
    .c-bear { fill:var(--series-4); }
    .w-bull { stroke:var(--series-2); stroke-width:1.5; fill:none; }
    .w-bear { stroke:var(--series-4); stroke-width:1.5; fill:none; }
    .data-body { opacity:0; }
    .data-body.visible { opacity:1; }

  </style>
</defs>

