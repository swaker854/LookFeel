


<svg id="root" class="chart-standard" viewBox="-40 88 1120 455" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="'Roboto',Arial,sans-serif">
<defs>
  <style>
    @import url('chart-shared.css');

    .c-bull { fill:var(--series-2); }
    .c-bear { fill:var(--series-4); }
    .w-bull { stroke:var(--series-2); stroke-width:1.5; fill:none; }
    .w-bear { stroke:var(--series-4); stroke-width:1.5; fill:none; }

    @keyframes dataFadeIn { from{opacity:0} to{opacity:1} }
    .data-body { animation:dataFadeIn 0.8s ease-out both; }
    .stagger-1  { animation-delay:0.00s; } .stagger-2  { animation-delay:0.16s; }
    .stagger-3  { animation-delay:0.32s; } .stagger-4  { animation-delay:0.48s; }
    .stagger-5  { animation-delay:0.64s; } .stagger-6  { animation-delay:0.80s; }
    .stagger-7  { animation-delay:0.96s; } .stagger-8  { animation-delay:1.12s; }
    .stagger-9  { animation-delay:1.28s; } .stagger-10 { animation-delay:1.44s; }
    .stagger-11 { animation-delay:1.60s; } .stagger-12 { animation-delay:1.76s; }

    .legend-value { opacity:0; transition:opacity 0.3s; }
    svg.print .legend-value { opacity:1; }
  </style>
</defs>

