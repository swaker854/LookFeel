<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var chartArea   = svgEl.querySelector('#chart-area');
    var dataItemEls = ctx.$$all('.data-item');
    var plotL = 42;
    var plotR = 840;
    var plotT = 100;
    var plotB = 500;

    function placeTip(itemEl, tipEl) {
      var wickEl = itemEl.querySelector('line');
      var itemBounds = itemEl.getBBox();
      var anchorX = wickEl ? parseFloat(wickEl.getAttribute('x1')) : itemBounds.x + itemBounds.width / 2;
      var anchorY = itemBounds.y;
      ctx.layoutSideTooltip(tipEl, {
        anchorX: anchorX,
        anchorY: anchorY,
        anchorInset: 18,
        plotL: plotL,
        plotR: plotR,
        plotT: plotT,
        plotB: plotB,
        lines: [
          { text: itemEl.getAttribute('data-close'), className: 'tip-value' },
          { text: itemEl.getAttribute('data-month') + ' - ' + itemEl.getAttribute('data-trend'), className: 'tip-label' },
          { text: 'O ' + itemEl.getAttribute('data-open') + '  H ' + itemEl.getAttribute('data-high') + '  L ' + itemEl.getAttribute('data-low'), className: 'tip-label' }
        ],
        lineHeights: [48, 34, 30],
        minWidth: 280,
        paddingX: 20,
        paddingY: 16
      });
      tipEl.removeAttribute('transform');
    }

    /* Hover dimming + tooltip via data-tip attribute */
    dataItemEls.forEach(function (itemEl) {
      var tipEl = svgEl.querySelector('#' + itemEl.getAttribute('data-tip'));
      itemEl.addEventListener('mouseenter', function () {
        ctx.activateExclusive(dataItemEls, itemEl);
        chartArea.classList.add('hovering');
        if (tipEl) {
          placeTip(itemEl, tipEl);
          ctx.setOpacity(tipEl, 1);
        }
      });
      itemEl.addEventListener('mouseleave', function () {
        chartArea.classList.remove('hovering');
        itemEl.classList.remove('active');
        ctx.setOpacity(tipEl, null);
      });
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>


