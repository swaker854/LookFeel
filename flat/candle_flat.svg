<!-- tooltips  each uses standard .tip-* classes.
     bull/bear value colors use inline fill on tspan since they are
     semantic (not categorical) and don't need dark mode class overrides
     they use the same green/rose as the candles themselves. -->
<g id="tip-layer" pointer-events="none">
  <g class="tip" id="tip">
    <rect id="tip-bg" class="tip-bg" rx="12"/>
    <path id="tip-bdr" class="tip-border"/>
    <path id="tip-tail" class="tip-tail"/>
    <text id="tip-val" class="tip-value" text-anchor="middle" dominant-baseline="central"/>
    <text id="tip-lbl" class="tip-label" text-anchor="middle" dominant-baseline="central"/>
    <text id="tip-meta" class="tip-pct" text-anchor="middle" dominant-baseline="central"/>
  </g>
</g>

<g id="legend-root"></g>

<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var chartArea   = svgEl.querySelector('#chart-area');
    var tip         = svgEl.querySelector('#tip');
    var legendRoot  = svgEl.querySelector('#legend-root');
    var dataItemEls = ctx.$$all('.data-item');
    var dataBodyEls = ctx.$$all('.data-body');
    var plotL = 42;
    var plotR = 840;
    var plotT = 100;
    var plotB = 500;

    dataBodyEls.forEach(function (dataBody, index) {
      var delay = ctx.getStaggerDelay(index, dataBodyEls.length, null, svgEl);
      ctx.animateAndMarkVisible(
        dataBody,
        'dataFadeIn var(--chart-fade-duration, 0.8s) ease-out ' + delay + 's'
      );
    });

    function getWickAnchor(itemEl) {
      var wickEl = itemEl.querySelector('line');
      var itemBounds = itemEl.getBBox();
      return {
        x: wickEl ? parseFloat(wickEl.getAttribute('x1')) : itemBounds.x + itemBounds.width / 2,
        y: itemBounds.y
      };
    }

    ctx.initStandardTooltip(chartArea, dataItemEls, {
      leaveTarget: chartArea,
      tip: tip,
      plotL: plotL,
      plotR: plotR,
      plotT: plotT,
      plotB: plotB,
      boxHeight: 132,
      minWidth: 280,
      lineY: [0.28, 0.54, 0.80],
      trackPointer: false,
      getContent: function (itemEl) {
        return {
          primary: itemEl.getAttribute('data-close') || '',
          label: (itemEl.getAttribute('data-month') || '') + ' - ' + (itemEl.getAttribute('data-trend') || ''),
          meta: 'O ' + (itemEl.getAttribute('data-open') || '') + '  H ' + (itemEl.getAttribute('data-high') || '') + '  L ' + (itemEl.getAttribute('data-low') || '')
        };
      },
      getAnchor: function (itemEl) {
        return getWickAnchor(itemEl);
      }
    });

    ctx.initStandardLegend({
      legendEl: legendRoot,
      title: 'SERIES',
      rowGap: 48,
      items: [
        { cls: 'c-bull', label: 'Bullish', value: '$165' },
        { cls: 'c-bear', label: 'Bearish', value: '$142' },
        { cls: 'series-8', label: 'Year High', value: '$172' },
        { cls: 'series-3', label: 'Year Low', value: '$115' },
        { cls: 'series-1', label: 'Range', value: '$57' }
      ]
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
