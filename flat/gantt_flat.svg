<svg id="root" class="chart-standard" viewBox="-40 88 1120 455" width="100%" height="100%"
     preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Roboto','Helvetica Neue',Arial,sans-serif">
<script type="text/javascript"><![CDATA[
(function () {
  if (window.location.href.indexOf('theme=dark') !== -1) {
    document.documentElement.classList.add('dark');
  }
}());
]]></script>
<defs>
  <style>
    @import url('chart-shared.css');
    .grid-line { stroke:#79747E; stroke-width:0.5; opacity:0.2; }
    .axis-lbl { font-size:10px; fill:#79747E; font-weight:400; }
    .row-lbl { font-size:10px; fill:#1C1B1F; font-weight:400; }
    svg.dark .row-lbl { fill:#E6E0E9; }
    .row-stripe { fill:#79747E; opacity:0.04; }
    svg.dark .row-stripe { fill:#ffffff; opacity:0.04; }
    .data-body { opacity:0; }
    .data-body.visible { opacity:1; }
    .data-layer.ready.hovering .data-item { opacity:0.20; transition:opacity .2s ease; }
    .data-layer.ready.hovering .data-item.active { opacity:1; }
    .today-line { stroke:#F43F5E; stroke-width:1.5; stroke-dasharray:4 3; opacity:0.7; }
    svg.dark .today-line { stroke:#FB6181; }
    .today-lbl { font-size:9px; fill:#F43F5E; font-weight:500; }
    svg.dark .today-lbl { fill:#FB6181; }
    .milestone { fill:#F43F5E; }
    svg.dark .milestone { fill:#FB6181; }
    .milestone-layer { opacity:0; pointer-events:none; }
    .milestone-layer.visible { opacity:1; }
    svg.print .today-line,
    svg.print .today-lbl { display:none; }
  </style>
</defs>

