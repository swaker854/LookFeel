<g id="tip-layer" pointer-events="none">
  <g class="tip" id="tip">
    <rect id="tip-bg" class="tip-bg" rx="12"/>
    <path id="tip-bdr" class="tip-border"/>
    <path id="tip-tail" class="tip-tail"/>
    <text id="tip-val" class="tip-value" text-anchor="middle" dominant-baseline="central"/>
    <text id="tip-lbl" class="tip-label" text-anchor="middle" dominant-baseline="central"/>
    <text id="tip-meta" class="tip-pct" text-anchor="middle" dominant-baseline="central"/>
  </g>
</g>

<g id="milestone-layer" class="milestone-layer">
  <g transform="translate(459,300)"><polygon class="milestone" points="0,-8 8,0 0,8 -8,0"/></g>
  <text x="461" y="293" class="today-lbl" font-size="9">Alpha</text>
  <g transform="translate(631,372)"><polygon class="milestone" points="0,-8 8,0 0,8 -8,0"/></g>
  <text x="633" y="365" class="today-lbl" font-size="9">Beta</text>
  <g transform="translate(843,492)"><polygon class="milestone" points="0,-7 7,0 0,7 -7,0"/></g>
  <text x="790" y="497" class="today-lbl" font-size="9" text-anchor="middle">GA Launch - Sep 30</text>
</g>

<g id="legend-root"></g>

<script href="chart-shared.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  var svg = document.documentElement;
  svg._chartInit = function (svgEl, ctx) {
    var dataLayerEl = svgEl.querySelector('#data-layer');
    var tip = svgEl.querySelector('#tip');
    var legendRoot = svgEl.querySelector('#legend-root');
    var milestoneLayer = svgEl.querySelector('#milestone-layer');
    var dataItemEls = ctx.$$all('.data-item');
    var dataBodyEls = ctx.$$all('.data-body');
    var timing = ctx.getStaggerTiming(dataBodyEls.length, { duration: 0.8 }, svgEl);
    var delays = dataBodyEls.map(function (_, index) {
      return ctx.getStaggerDelay(index, dataBodyEls.length, null, svgEl);
    });

    ctx.initRevealSequence(dataBodyEls, {
      animationName: 'dataFadeIn',
      duration: timing.duration,
      easing: 'ease-out',
      delays: delays
    });

    ctx.markReadyAfterReveal(dataLayerEl, {
      delays: delays,
      duration: timing.duration,
      buffer: timing.buffer
    });

    setTimeout(function () {
      if (milestoneLayer) {
        ctx.animateAndMarkVisible(milestoneLayer, 'dataFadeIn 0.3s ease-out 0s');
      }
    }, Math.max(0, timing.readyDelayMs - 200));

    ctx.initStandardTooltip(dataLayerEl, dataItemEls, {
      leaveTarget: dataLayerEl,
      tip: tip,
      meta: svgEl.querySelector('#tip-meta'),
      plotL: 68,
      plotR: 850,
      plotT: 100,
      plotB: 500,
      boxHeight: 148,
      minWidth: 320,
      lineY: [0.24, 0.52, 0.78],
      trackPointer: false,
      getContent: function (itemEl) {
        return {
          primary: itemEl.getAttribute('data-val') || '',
          label: itemEl.getAttribute('data-lbl') || '',
          meta: itemEl.getAttribute('data-meta') || ''
        };
      },
      getAnchor: function (itemEl) {
        return {
          x: parseFloat(itemEl.getAttribute('data-cx')) || 0,
          y: parseFloat(itemEl.getAttribute('data-barty')) || 0
        };
      }
    });

    ctx.initStandardLegend({
      legendEl: legendRoot,
      title: 'WORKSTREAM',
      labelMaxWidth: 118,
      items: [
        { cls: 'series-1', label: 'User Research', value: '30d' },
        { cls: 'series-2', label: 'UX Wireframes', value: '33d' },
        { cls: 'series-6', label: 'Component Library', value: '61d' },
        { cls: 'series-7', label: 'API Development', value: '76d' },
        { cls: 'series-4', label: 'Integration Testing', value: '46d' },
        { cls: 'series-8', label: 'Cloud Provisioning', value: '45d' }
      ]
    });
  };
  if (window.bootstrapChart) { window.bootstrapChart(svg); }
}());
]]></script>
</svg>
