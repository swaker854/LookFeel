<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portal Navbar Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8e5df; font-family: Roboto, -apple-system, sans-serif; font-size: 13px; }

  :root {
    --inet-navbar-bg-color: #4A4845;
    --inet-navbar-text-color: #fff;
    --inet-primary-color: #ed711c;
    --inet-portal-navbar-hover-bg-color: rgba(255,255,255,0.12);
    --inet-nav-tabs-bg-color: #F1EFEA;
    --inet-main-panel-bg-color: #fff;
    --inet-default-border-color: #D9D5CC;
  }

  /* ── Navbar ── */
  .portal-navbar {
    display: flex;
    align-items: center;
    height: 44px;
    background-color: var(--inet-navbar-bg-color);
    color: var(--inet-navbar-text-color);
    padding: 0 4px;
    gap: 0;
    position: relative;
  }

  /* Logo */
  .title-bar-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }
  .logo-svg { width: 22px; height: 22px; }

  /* Nav groups */
  .navbar-nav {
    display: flex;
    align-items: stretch;
    list-style: none;
    height: 100%;
    gap: 0;
  }
  .navbar-nav.ms-auto { margin-left: auto; }

  /* Nav items */
  .nav-item {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    height: 100%;
    position: relative;
    cursor: pointer;
  }

  .nav-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 0 8px;
    color: var(--inet-navbar-text-color);
    text-decoration: none;
    opacity: 0.85;
  }
  .nav-link:hover { opacity: 1; }

  .nav-item:hover > .nav-link,
  .nav-item:hover > a {
    background-color: var(--inet-portal-navbar-hover-bg-color);
  }

  /* Active bottom marker */
  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background-color: var(--inet-primary-color);
  }

  /* Icons — using SVG stand-ins sized to match 20px */
  .icon { width: 20px; height: 20px; fill: currentColor; }
  .icon-account { width: 24px; height: 24px; fill: currentColor; }

  /* ── Sub-navbar (tab bar) ── */
  .portal-sub-navbar {
    display: flex;
    align-items: center;
    height: 36px;
    background-color: var(--inet-nav-tabs-bg-color);
    border-bottom: 1px solid var(--inet-default-border-color);
    padding: 0 12px;
    gap: 4px;
  }
  .sub-tab {
    display: flex;
    align-items: center;
    height: 32px;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 500;
    color: #6A685F;
    border-radius: 3px 3px 0 0;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
  }
  .sub-tab.active {
    background-color: var(--inet-main-panel-bg-color);
    color: #35342F;
    border-color: var(--inet-default-border-color);
    border-bottom-color: var(--inet-main-panel-bg-color);
  }

  /* ── Main content placeholder ── */
  .main-content {
    background: #fff;
    height: 320px;
    display: flex;
    flex-direction: column;
  }

  /* ── Annotation labels ── */
  .label-row {
    display: flex;
    align-items: flex-start;
    height: 44px;
    background: transparent;
    margin-top: 4px;
  }
  .label-logo { width: 44px; text-align: center; }
  .label-group-left {
    display: flex;
    gap: 0;
  }
  .label-group-right {
    margin-left: auto;
    display: flex;
    gap: 0;
  }
  .lbl {
    min-width: 36px;
    padding: 4px 6px;
    font-size: 10px;
    color: #666;
    text-align: center;
    border-top: 1px dashed #bbb;
    line-height: 1.2;
  }
  .lbl.new { color: #b05800; font-weight: 600; border-top-color: #b05800; }

  /* divider between left and right annotation groups */
  .lbl-spacer { flex: 1; }
</style>
</head>
