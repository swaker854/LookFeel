<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EChart Viewer</title>
<style>
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; }
  body {
    background: #151825;
    font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  }
  body.light {
    background: #f8f5fb;
  }
  .viewer {
    width: 100%;
    height: 100%;
    padding: 16px;
  }
  .frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: transparent;
    display: block;
  }
</style>
</head>
<body>
  <div class="viewer">
    <iframe class="frame" id="chart-frame"></iframe>
  </div>
<script>
  const defaultPalette = ['#00D4E8', '#00B87A', '#F59E0B', '#F43F5E', '#8B5CF6', '#3B82F6', '#0D9488', '#64748B'];
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src');
  const dark = params.get('dark') !== '0';
  const frame = document.getElementById('chart-frame');

  if (src) frame.src = src;
  document.body.classList.toggle('light', !dark);

  function syncFrame() {
    if (!frame || !frame.contentWindow) return;
    frame.contentWindow.postMessage({ type: 'setPalette', colors: defaultPalette }, '*');
    frame.contentWindow.postMessage({ type: 'setMode', dark: dark }, '*');
  }

  frame.addEventListener('load', syncFrame);
  window.addEventListener('resize', syncFrame);
</script>
</body>
</html>
