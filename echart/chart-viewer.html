<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EChart Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script src="./chart-registry.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; }
  body {
    background: #151825;
    font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  }
  body.light {
    background: #f8f5fb;
  }
  .viewer {
    width: 100%;
    height: 100%;
    padding: 16px;
  }
  .frame {
    width: 100%;
    height: 100%;
    background: transparent;
    display: block;
  }
</style>
</head>
<body>
  <div class="viewer">
    <div class="frame" id="chart-frame"></div>
  </div>
<script>
  const defaultPalette = ['#00D4E8', '#00B87A', '#F59E0B', '#F43F5E', '#8B5CF6', '#3B82F6', '#0D9488', '#64748B'];
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key');
  const dark = params.get('dark') !== '0';
  const frame = document.getElementById('chart-frame');
  frame.setAttribute('data-initial-dark', dark ? '1' : '0');
  const chartInstance = key ? window.LookfeelCharts.mount(frame, key) : null;
  document.body.classList.toggle('light', !dark);

  function syncChart() {
    if (!chartInstance) return;
    chartInstance.setPalette(defaultPalette);
    chartInstance.setMode(dark);
  }

  syncChart();
  window.addEventListener('resize', function() {
    if (chartInstance) chartInstance.resize();
  });
</script>
</body>
</html>
