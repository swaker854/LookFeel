<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radar EChart</title>
<style>
  html, body, #chart { width: 100%; height: 100%; margin: 0; background: transparent; overflow: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
</head>
<body>
<div id="chart"></div>
<script>
  const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });
  const state = {
    dark: true,
    colors: ['#00D4E8', '#00B87A', '#F59E0B', '#F43F5E', '#8B5CF6', '#3B82F6', '#0D9488', '#64748B']
  };
  function tooltip(param) {
    const dark = state.dark;
    return '<div style="min-width:120px;padding:10px 12px;border-radius:10px;background:' + (dark ? '#1C1B1F' : '#FFFBFE') + ';border:1px solid ' + (dark ? '#938F99' : '#79747E') + ';">' +
      '<div style="color:' + (dark ? '#E6E0E9' : '#1C1B1F') + ';font-size:13px;font-weight:600;">' + param.name + '</div>' +
      '<div style="margin-top:6px;color:' + (dark ? '#CAC4D0' : '#49454F') + ';font-size:10px;">' + param.value.join(' · ') + '</div>' +
    '</div>';
  }
  function option() {
    const dark = state.dark;
    const darkPalette = ['#22D3EE', '#10B981', '#FBB724', '#FB6181', '#A78BFA', '#60A5FA', '#2DD4BF', '#94A3B8'];
    const colors = dark ? [darkPalette[0], darkPalette[1], darkPalette[4]] : [state.colors[0], state.colors[1], state.colors[4]];
    return {
      animationDuration: 800,
      animationDurationUpdate: 250,
      animationEasing: 'cubicOut',
      color: colors,
      backgroundColor: 'transparent',
      tooltip: {
        trigger: 'item',
        confine: true,
        backgroundColor: 'transparent',
        borderWidth: 0,
        padding: 0,
        extraCssText: 'box-shadow:none;background:transparent;',
        formatter: tooltip,
        position: function(pos, params, dom, rect, size) {
          const x = Math.max(8, Math.min(pos[0] - size.contentSize[0] / 2, size.viewSize[0] - size.contentSize[0] - 8));
          const preferredY = rect ? rect.y - size.contentSize[1] - 14 : pos[1] - size.contentSize[1] - 18;
          const fallbackY = rect ? rect.y + rect.height + 14 : pos[1] + 18;
          const y = preferredY < 8 ? Math.min(size.viewSize[1] - size.contentSize[1] - 8, fallbackY) : preferredY;
          return [x, Math.max(8, Math.min(y, size.viewSize[1] - size.contentSize[1] - 8))];
        }
      },
      radar: {
        center: ['43%', '53%'],
        radius: '62%',
        splitNumber: 5,
        indicator: [
          { name: 'Revenue', max: 100 },
          { name: 'Growth', max: 100 },
          { name: 'Margin', max: 100 },
          { name: 'Satisfaction', max: 100 },
          { name: 'Retention', max: 100 },
          { name: 'Innovation', max: 100 },
          { name: 'Quality', max: 100 }
        ],
        axisName: { color: dark ? '#938F99' : '#79747E', fontSize: 11 },
        axisLine: { lineStyle: { color: dark ? 'rgba(147,143,153,0.25)' : 'rgba(121,116,126,0.25)' } },
        splitLine: { lineStyle: { color: dark ? '#49454F' : '#E7E0EC' } },
        splitArea: { areaStyle: { color: ['transparent'] } }
      },
      series: [{
        type: 'radar',
        symbol: 'circle',
        symbolSize: 7,
        lineStyle: { width: 2.5 },
        areaStyle: { opacity: 0.18 },
        data: [
          { value: [72, 65, 58, 80, 74, 55, 68], name: 'Cyan', itemStyle: { color: colors[0] }, lineStyle: { color: colors[0] }, areaStyle: { color: colors[0], opacity: 0.18 } },
          { value: [55, 82, 70, 63, 58, 88, 72], name: 'Violet', itemStyle: { color: colors[2] }, lineStyle: { color: colors[2] }, areaStyle: { color: colors[2], opacity: 0.18 } },
          { value: [64, 50, 85, 71, 82, 62, 90], name: 'Emerald', itemStyle: { color: colors[1] }, lineStyle: { color: colors[1] }, areaStyle: { color: colors[1], opacity: 0.18 } }
        ]
      }]
    };
  }
  function render() { chart.setOption(option(), true); }
  let _rt = null;
  function scheduleRender() { clearTimeout(_rt); _rt = setTimeout(render, 200); }
  window.addEventListener('message', function(event) {
    const data = event.data || {};
    if (data.type === 'setPalette' && Array.isArray(data.colors)) state.colors = data.colors;
    if (data.type === 'setMode') state.dark = !!data.dark;
    scheduleRender();
  });
  window.addEventListener('resize', function() { chart.resize(); });
  scheduleRender();
</script>
</body>
</html>
