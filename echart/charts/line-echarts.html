<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Line EChart</title>
<style>
  html, body, #chart { width: 100%; height: 100%; margin: 0; background: transparent; overflow: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
</head>
<body>
<div id="chart"></div>
<script>
  const chart = echarts.init(document.getElementById('chart'), null, { renderer: 'svg' });
  const state = {
    dark: true,
    colors: ['#00D4E8', '#00B87A', '#F59E0B', '#F43F5E', '#8B5CF6', '#3B82F6', '#0D9488', '#64748B']
  };
  const quarters = ["Q1 '22", "Q2 '22", "Q3 '22", "Q4 '22", "Q1 '23", "Q2 '23", "Q3 '23", "Q4 '23"];
  const seriesData = [
    { name: 'Cyan', values: [32, 38, 41, 35, 31, 44, 58, 72] },
    { name: 'Violet', values: [28, 31, 35, 40, 44, 49, 55, 62] },
    { name: 'Emerald', values: [18, 22, 25, 29, 36, 42, 31, 35] },
    { name: 'Amber', values: [12, 15, 18, 24, 34, 20, 16, 22] },
    { name: 'Slate', values: [10, 13, 11, 15, 13, 28, 40, 19] }
  ];
  function tooltip(params) {
    const dark = state.dark;
    const lines = params.map(function(param) {
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:6px;">' +
        '<div style="display:flex;align-items:center;gap:8px;color:' + (dark ? '#CAC4D0' : '#49454F') + ';font-size:10px;">' +
          '<span style="width:8px;height:8px;border-radius:999px;background:' + param.color + ';display:inline-block;"></span>' +
          '<span>' + param.seriesName + '</span>' +
        '</div>' +
        '<div style="color:' + (dark ? '#E6E0E9' : '#1C1B1F') + ';font-size:11px;font-weight:600;">$' + param.value + 'M</div>' +
      '</div>';
    }).join('');
    return '<div style="min-width:138px;padding:10px 12px;border-radius:10px;background:' + (dark ? '#1C1B1F' : '#FFFBFE') + ';border:1px solid ' + (dark ? '#938F99' : '#79747E') + ';">' +
      '<div style="color:' + (dark ? '#E6E0E9' : '#1C1B1F') + ';font-size:13px;font-weight:600;">' + params[0].axisValue + '</div>' +
      '<div style="margin-top:4px;color:' + (dark ? '#938F99' : '#79747E') + ';font-size:10px;">Performance trend</div>' +
      lines +
    '</div>';
  }

  function areaGradient(color, dark) {
    return new echarts.graphic.LinearGradient(0, 0, 0, 1, [
      { offset: 0, color: echarts.color.modifyAlpha(color, dark ? 0.28 : 0.22) },
      { offset: 1, color: echarts.color.modifyAlpha(color, 0.02) }
    ]);
  }

  function legendGraphic(colors) {
    const dark = state.dark;
    const panelWidth = 124;
    const panelX = Math.max(0, chart.getWidth() - panelWidth - 12);
    const panelY = 8;
    const rowStartY = 42;
    const rowHeight = 18;
    const panelHeight = rowStartY + seriesData.length * rowHeight + 12;
    const children = [{
      type: 'rect',
      shape: { x: 0, y: 0, width: panelWidth, height: panelHeight, r: 14 },
      style: { fill: dark ? '#2A2630' : '#F3EDF7', stroke: dark ? '#938F99' : '#79747E', lineWidth: 1, opacity: dark ? 0.95 : 1 }
    }, {
      type: 'text',
      style: { x: 18, y: 18, text: 'SERIES', fill: dark ? '#938F99' : '#79747E', font: '500 10px Roboto, Helvetica Neue, Arial, sans-serif' }
    }];

    seriesData.forEach(function(series, idx) {
      const y = rowStartY + idx * rowHeight;
      children.push({
        type: 'rect',
        shape: { x: 18, y: y - 8, width: 14, height: 14, r: 3 },
        style: { fill: colors[idx] }
      });
      children.push({
        type: 'text',
        style: {
          x: 40, y: y, text: series.name, textVerticalAlign: 'middle',
          fill: dark ? '#E6E0E9' : '#1C1B1F',
          font: '400 11px Roboto, Helvetica Neue, Arial, sans-serif'
        }
      });
    });

    return [{
      type: 'group',
      left: panelX,
      top: panelY,
      bounding: 'all',
      children: children
    }];
  }

  function option() {
    const dark = state.dark;
    const darkPalette = ['#22D3EE', '#A78BFA', '#10B981', '#FBB724', '#94A3B8'];
    const lightPalette = [state.colors[0], state.colors[4], state.colors[1], state.colors[2], state.colors[7]];
    const colors = dark ? darkPalette : lightPalette;
    const gridRight = 148;
    const plotWidth = Math.max(200, chart.getWidth() - 48 - gridRight);
    return {
      animationDuration: 800,
      animationDurationUpdate: 250,
      animationEasing: 'cubicOut',
      color: colors,
      backgroundColor: 'transparent',
      grid: { left: 48, right: gridRight, top: 24, bottom: 34 },
      tooltip: {
        trigger: 'axis',
        confine: true,
        axisPointer: {
          type: 'line',
          lineStyle: { color: dark ? '#938F99' : '#c0b8a8', width: 1, type: 'dashed', dashOffset: 0 }
        },
        backgroundColor: 'transparent',
        borderWidth: 0,
        padding: 0,
        extraCssText: 'box-shadow:none;background:transparent;',
        formatter: tooltip,
        order: 'seriesAsc',
        position: function(pos, params, dom, rect, size) {
          const edgePad = 8;
          const bottomPad = 28;
          const anchor = rect || (params && params[0] && params[0].axisValue != null ? { x: pos[0], y: pos[1], height: 0 } : null);
          const x = Math.max(edgePad, Math.min(pos[0] - size.contentSize[0] / 2, size.viewSize[0] - size.contentSize[0] - edgePad));
          const preferredY = anchor ? anchor.y - size.contentSize[1] - 14 : pos[1] - size.contentSize[1] - 18;
          const fallbackY = anchor ? anchor.y + (anchor.height || 0) + 14 : pos[1] + 18;
          const maxY = size.viewSize[1] - size.contentSize[1] - bottomPad;
          const y = preferredY < edgePad ? Math.min(maxY, fallbackY) : preferredY;
          return [x, Math.max(edgePad, Math.min(y, maxY))];
        }
      },
      graphic: [
        {
          type: 'line',
          left: 48 + plotWidth / 2,
          top: 24,
          shape: { x1: 0, y1: 0, x2: 0, y2: chart.getHeight() - 58 },
          style: { stroke: dark ? '#938F99' : '#c0b8a8', lineWidth: 1, opacity: 0.6, lineDash: [5, 4] }
        },
        {
          type: 'text',
          left: 48 + plotWidth / 4 - 12,
          top: 2,
          style: { text: '2022', fill: dark ? '#938F99' : '#79747E', font: '400 10px Roboto, Helvetica Neue, Arial, sans-serif' }
        },
        {
          type: 'text',
          left: 48 + plotWidth * 0.75 - 12,
          top: 2,
          style: { text: '2023', fill: dark ? '#938F99' : '#79747E', font: '400 10px Roboto, Helvetica Neue, Arial, sans-serif' }
        }
      ].concat(legendGraphic(colors)),
      xAxis: {
        type: 'category',
        boundaryGap: false,
        data: quarters,
        axisLine: { lineStyle: { color: dark ? '#938F99' : '#79747E', width: 1.5 } },
        axisTick: { show: false },
        axisLabel: { color: dark ? '#938F99' : '#79747E', fontSize: 10, margin: 12 }
      },
      yAxis: {
        type: 'value',
        min: 0,
        max: 100,
        interval: 25,
        axisLine: { show: true, lineStyle: { color: dark ? '#938F99' : '#79747E', width: 1.5 } },
        axisTick: { show: false },
        axisLabel: {
          color: dark ? '#938F99' : '#79747E',
          fontSize: 10,
          formatter: function(v) { return '$' + v + 'M'; }
        },
        splitLine: { lineStyle: { color: dark ? '#49454F' : '#E7E0EC' } }
      },
      series: seriesData.map(function(series, idx) {
        const color = colors[idx];
        return {
          type: 'line',
          id: 'line-' + series.name,
          name: series.name,
          smooth: false,
          symbol: 'none',
          data: series.values,
          showSymbol: false,
          lineStyle: {
            width: series.name === 'Slate' ? 2 : 2.5,
            color: color,
            type: series.name === 'Slate' ? 'dashed' : 'solid'
          },
          itemStyle: { color: color, borderColor: dark ? '#151825' : '#f8f5fb', borderWidth: 0 },
          emphasis: { focus: 'series', blurScope: 'coordinateSystem' },
          blur: { lineStyle: { opacity: 0.2 }, itemStyle: { opacity: 0.2 } },
          areaStyle: { color: areaGradient(color, dark) },
          animationDelay: function() { return idx * 180; },
          z: 5 + (seriesData.length - idx)
        };
      }).concat(seriesData.map(function(series, idx) {
        return {
          type: 'line',
          id: 'hit-' + series.name,
          name: series.name + ' hit',
          data: series.values,
          symbol: 'none',
          showSymbol: false,
          tooltip: { show: false },
          lineStyle: { width: 16, color: 'rgba(0,0,0,0)', opacity: 0 },
          itemStyle: { opacity: 0 },
          emphasis: { disabled: true },
          silent: false,
          z: 200 + idx,
          zlevel: 2
        };
      })).concat(seriesData.map(function(series, idx) {
        const color = colors[idx];
        return {
          type: 'scatter',
          id: 'marker-' + series.name,
          name: series.name + ' markers',
          data: quarters.map(function(quarter, dataIdx) { return [quarter, series.values[dataIdx]]; }),
          symbol: 'circle',
          symbolSize: 10,
          itemStyle: { color: color, borderColor: dark ? '#151825' : '#f8f5fb', borderWidth: 0 },
          emphasis: { scale: 1.18, itemStyle: { color: color } },
          blur: { itemStyle: { opacity: 0.2 } },
          tooltip: { show: false },
          z: 300 + idx,
          zlevel: 3
        };
      }))
    };
  }

  function render() { chart.setOption(option(), true); }
  function bindHoverSync() {
    chart.off('mouseover');
    chart.off('mouseout');
    chart.off('globalout');

    chart.on('mouseover', function(params) {
      if (params.componentType !== 'series' || typeof params.seriesId !== 'string') return;
      let seriesName = null;
      if (params.seriesId.indexOf('marker-') === 0) seriesName = params.seriesId.slice('marker-'.length);
      if (params.seriesId.indexOf('hit-') === 0) seriesName = params.seriesId.slice('hit-'.length);
      if (!seriesName) return;
      chart.dispatchAction({ type: 'downplay', seriesIndex: 'all' });
      chart.dispatchAction({ type: 'highlight', seriesId: 'line-' + seriesName });
      chart.dispatchAction({ type: 'highlight', seriesId: 'marker-' + seriesName });
    });

    chart.on('mouseout', function(params) {
      if (params.componentType !== 'series') return;
      chart.dispatchAction({ type: 'downplay', seriesIndex: 'all' });
    });

    chart.on('globalout', function() {
      chart.dispatchAction({ type: 'downplay', seriesIndex: 'all' });
    });
  }
  let _rt = null;
  function scheduleRender() { clearTimeout(_rt); _rt = setTimeout(render, 200); }
  window.addEventListener('message', function(event) {
    const data = event.data || {};
    if (data.type === 'setPalette' && Array.isArray(data.colors)) state.colors = data.colors;
    if (data.type === 'setMode') state.dark = !!data.dark;
    scheduleRender();
  });
  window.addEventListener('resize', function() { chart.resize(); scheduleRender(); });
  bindHoverSync();
  scheduleRender();
</script>
</body>
</html>
