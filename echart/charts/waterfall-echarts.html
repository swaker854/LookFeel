<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Waterfall EChart</title>
<style>
  html, body, #chart { width: 100%; height: 100%; margin: 0; background: transparent; overflow: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script src="../chart-registry.js"></script>
</head>
<body>
<div id="chart"></div>
<script>
  const chart = window.LookfeelCharts.mount(document.getElementById('chart'), 'waterfall-echarts');
  chart.setMode(true);
  chart.setPalette(window.LookfeelCharts.defaultPalette);
  window.addEventListener('resize', function() { chart.resize(); });
</script>
</body>
</html>
