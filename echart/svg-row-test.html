<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Row Test</title>
  <style>
    :root {
      --bg: #f6f3ec;
      --panel: #fffdf8;
      --border: #ddd6c8;
      --text: #3e3a34;
      --muted: #746f66;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font: 13px/1.4 Georgia, "Times New Roman", serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8f5ef 0%, #f1ece2 100%);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(62, 58, 52, 0.06);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 600;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .svg-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .svg-card {
      flex: 0 0 auto;
      width: 180px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
    }

    .svg-frame {
      display: grid;
      place-items: center;
      height: 120px;
      border-radius: 8px;
      background:
        linear-gradient(45deg, #f4efe6 25%, transparent 25%) 0 0 / 16px 16px,
        linear-gradient(-45deg, #f4efe6 25%, transparent 25%) 0 0 / 16px 16px,
        linear-gradient(45deg, transparent 75%, #f4efe6 75%) 0 0 / 16px 16px,
        linear-gradient(-45deg, transparent 75%, #f4efe6 75%) 0 0 / 16px 16px,
        #fffdfa;
      overflow: hidden;
    }

    .svg-frame img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .svg-label {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>SVG Row Test</h1>
      <p>Edit the <code>svgFiles</code> array in this file and refresh.</p>
      <div id="svgRow" class="svg-row"></div>
    </section>
  </main>

  <script>
    const svgFiles = [
      "chart-donut.svg",
      "chart-mekko.svg",
      "database.svg"
    ];

    const row = document.getElementById("svgRow");

    svgFiles.forEach((file) => {
      const card = document.createElement("figure");
      card.className = "svg-card";

      const frame = document.createElement("div");
      frame.className = "svg-frame";

      const img = document.createElement("img");
      img.src = file;
      img.alt = file;

      const label = document.createElement("figcaption");
      label.className = "svg-label";
      label.textContent = file;

      frame.appendChild(img);
      card.appendChild(frame);
      card.appendChild(label);
      row.appendChild(card);
    });
  </script>
</body>
</html>
